            operationId: update_partner_merchant_handler_v1.patch
            description: 'Update details of a specific merchant associated with your
                marketplace. Note: The legacy endpoint `/v1/partner/{partner_id}/merchant/{merchant_id}`
                is deprecated but still supported for backward compatibility.'
            tags:
            - Marketplace V1
            parameters:
            -   name: merchant_id
                in: path
                required: true
                schema:
                    type: string
                description: ''
            responses:
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '200':
                    description: Success
                '403':
                    description: Access denied
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '404':
                    description: Merchant not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
            security:
            -   X-Api-Key: []
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdatePartnerMerchantSchema'
                        examples:
                            GB merchant:
                                value:
                                    national_id: '925976105'
                                    legal_name: Two B2B LIMITED
                                    email: test@two.inc
                                    email_erp: erp@two.inc
                                    email_invoice: invoice@two.inc
                                    phone: '12345678'
                                    phone_invoice: '12345670'
                                    website: https://two.inc
                                    address_lines: Test Square
                                    address_city: London
                                    address_postal_code: AED 12A
                                    address_country_code: GB
                                    payment_provider_details:
                                        bank_account:
                                            description: Bank Account Test
                                            branch_sort_code: 04-00-11
                                            local_account_number: '31126819'
                                            country_code: GB
                            NO merchant:
                                value:
                                    national_id: '13078389'
                                    legal_name: Two AS
                                    email: test@two.inc
                                    email_erp: erp@two.inc
                                    email_invoice: invoice@two.inc
                                    phone: '12345678'
                                    phone_invoice: '12345670'
                                    website: https://two.inc
                                    address_lines: Test plass
                                    address_city: Oslo
                                    address_postal_code: '1111'
                                    address_country_code: 'NO'
                                    payment_provider_details:
                                        bank_account:
                                            description: Bank Account Test
                                            bban: '11111111111'
                                            iban: NO9311111111111
                                            bic: DNBANOKK
                                            country_code: 'NO'
    /partner/v1/iban_accounts:
        get:
            summary: Get IBAN collection accounts
            operationId: get_partner_iban_accounts_v1.get
            description: 'Returns IBAN collection account details for eligible partners.
                Access is restricted - please contact Two support for more information.
                Note: The legacy endpoint `/v1/partner/iban_accounts` is deprecated
                but still supported for backward compatibility.'
            tags:
