                '409':
                    description: Merchant already exists
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
            security:
            -   X-Api-Key: []
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreatePartnerMerchantRequestSchema'
                        examples:
                            GB merchant:
                                value:
                                    short_name: testshortname
                                    logo_path: https://test.com/test.png
                                    national_id: '13078389'
                                    legal_name: Two B2B LIMITED
                                    email: test@two.inc
                                    email_erp: erp@two.inc
                                    email_invoice: invoice@two.inc
                                    phone: '12345678'
                                    phone_invoice: '12345670'
                                    website: https://two.inc
                                    address_lines: Test Square
                                    address_city: London
                                    address_postal_code: AED 12A
                                    address_country_code: GB
                                    fixed_fee_per_order: '0.0'
                                    percentage_fee_per_order: '2.0'
                                    country_code: GB
                                    payment_provider_details:
                                        bank_account:
                                            description: Bank Account Test
                                            branch_sort_code: 04-00-11
                                            local_account_number: '31126819'
                                            country_code: GB
                            NO merchant:
                                value:
                                    short_name: testshortname
                                    logo_path: https://test.com/test.png
                                    national_id: '925976105'
                                    legal_name: Two AS
                                    email: test@two.inc
                                    email_erp: erp@two.inc
                                    email_invoice: invoice@two.inc
                                    phone: '12345678'
                                    phone_invoice: '12345670'
                                    website: https://two.inc
                                    address_lines: Testplass 1
                                    address_city: OSLO
                                    address_postal_code: '1111'
                                    address_country_code: 'NO'
                                    fixed_fee_per_order: '0.0'
                                    percentage_fee_per_order: '2.0'
                                    country_code: 'NO'
                                    payment_provider_details:
                                        bank_account:
                                            description: Bank Account Test
                                            bban: '11111111111'
                                            iban: NO9311111111111
                                            bic: DNBANOKK
                                            country_code: 'NO'
        get:
            summary: Get all marketplace merchants
            operationId: get_partners_merchant_handler_v1.get
            description: 'Retrieve all merchants associated with your marketplace.
                Note: The legacy endpoint `/v1/partner/{partner_id}/merchant` is deprecated
                but still supported for backward compatibility.'
            tags:
            - Marketplace V1
            parameters: []
            responses:
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '200':
                    description: Merchant
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MerchantResponseListSchema'
                '403':
                    description: Access denied
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '404':
                    description: Merchant not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
            security:
            -   X-Api-Key: []
    /partner/v1/merchant/{merchant_id}:
        get:
            summary: Get marketplace merchant
            operationId: get_partner_merchant_handler_v1.get
            description: 'Retrieve information about a specific merchant by ID. Note:
                The legacy endpoint `/v1/partner/{partner_id}/merchant/{merchant_id}`
                is deprecated but still supported for backward compatibility.'
