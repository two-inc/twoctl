                    default: null
                    description: Country code of the merchant
                national_id:
                    description: National ID of the merchant
                    title: National Id
                    type: string
                legal_name:
                    description: Legal name of the merchant
                    title: Legal Name
                    type: string
                display_name:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
