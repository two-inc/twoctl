                    -   type: 'null'
                    default: null
                    title: Bban
                iban:
                    anyOf:
                    -   maxLength: 34
                        minLength: 15
                        pattern: ^[0-9A-Za-z]*$
                        type: string
                    -   type: 'null'
                    default: null
                    title: Iban
                bic:
                    anyOf:
                    -   maxLength: 12
                        minLength: 8
                        pattern: ^[0-9A-Za-z]*$
                        type: string
                    -   type: 'null'
                    default: null
                    title: Bic
