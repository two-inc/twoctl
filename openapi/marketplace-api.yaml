components:
    schemas:
        ErrorResponse:
            properties:
                error_code:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: An error code related to the error.
                    title: Error Code
                error_details:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: A detailed description of the error when available.
                    title: Error Details
                error_message:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: A short description of the error.
                    title: Error Message
                error_json:
                    anyOf:
                    -   items:
                            $ref: '#/components/schemas/ErrorJSON'
                        type: array
                    -   type: 'null'
                    default: null
                    description: A list of errors when available.
                    title: Error Json
                error_trace_id:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: A unique trace ID for the request that generated
                        the error. Please quote this trace ID in any support requests.
                    title: Error Trace Id
            title: ErrorResponse
            type: object
        ErrorJSON:
            properties:
                loc:
                    anyOf:
                    -   items:
                            anyOf:
                            -   type: string
                            -   type: integer
                        type: array
                    -   type: 'null'
                    default: null
                    description: Error location.
                    title: Loc
                msg:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Error message.
                    title: Msg
                type:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Error type.
                    title: Type
                ctx:
                    anyOf:
                    -   type: string
                    -   additionalProperties: true
                        type: object
                    -   type: 'null'
                    default: null
                    description: Error context information.
                    title: Ctx
            title: ErrorJSON
            type: object
        CreatePartnerMerchantRequestSchema:
