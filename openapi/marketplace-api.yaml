                        type: string
                    -   type: 'null'
                    default: null
                    description: Unique ID of the merchant
                    title: Id
                short_name:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    deprecated: true
                    description: Short name of the merchant
                    title: Short Name
                logo_path:
