            - Marketplace V1
            parameters: []
            responses:
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '201':
                    description: Merchant created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreatePartnerMerchantResponseSchema'
                '403':
                    description: Access denied
                    content:
                        application/json:
                            schema:
