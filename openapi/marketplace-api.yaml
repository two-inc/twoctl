                phone_invoice:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Phone number for invoices of the merchant
                    title: Phone Invoice
                address_lines:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: The address lines of the merchant
                    title: Address Lines
                address_city:
                    anyOf:
