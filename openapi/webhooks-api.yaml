  customer-user-verified:
    post:
      tags:
        - Customer User
      summary: Customer User Verified
      description: |-
        Type: `customer.user.verified.v1`

        Occurs when a customer user successfully completes verification

        #### Payload

        The `data` object in the payload contains IDs that indicate your merchant_user_id that has been verified and your associated
        merchant_customer_id

        #### Example

        ```json
        {
            "specversion":"1.0",
            "id": "01FBJ0PYJ7931K0CJ6GMP8N3WG",
            "type": "customer.user.verified.v1",
            "time": "2023-06-21T12:34:56.123456Z",
            "source": "https://api.two.inc",
            "subject": "customer/user/external-user-id-123",
            "twomerchantid":"b6b9d5d1-f6b7-4e15-9703-9c32c6e5c1c2",
            "data": {
                "merchant_id": "12345678",
                "merchant_customer_id": "external-customer-123",
                "merchant_user_id": "external-user-id-123",
        }
        ```

        #### Triggering in sandbox

        1. Follow docs to [create business customer and business customer user](/docs/api/trade-account-v3/).
        2. Follow the user_verification_url returned from [Create customer user record](/docs/api/trade-account-v3/create-trade-account-customer-user-handler-post/) to verify user.
        3. Once the verification process is completed successfully, the `customer.user.verified.v1` webhook will be sent to any endpoints subscribed to this event.
      operationId: customer_user_verifiedcustomer_user_verified_post
      requestBody:
        content:
