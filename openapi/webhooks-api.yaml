  merchant-payee-account-activated:
    post:
      tags:
        - Merchant Payee Account
      summary: Merchant Payee Account Activated
      description: |-
        Type: `merchant.payee_account.activated.v1`

        Occurs when a payee account for a given country and invoice type for a merchant is activated

        #### Payload

        The `data` object in the payload contains data that indicates a merchant has been activated. Payload will
        include merchant_id, merchant_legal_name, merchant_country_code of merchant and country code and invoice type
        of activated payee account.

        #### Example

        ```json
        {
            "specversion":"1.0",
            "id": "01FBJ0PYJ7931K0CJ6GMP8N3WG",
            "type": "merchant.payee_account.activated.v1",
            "time": "2023-06-21T12:34:56.123456Z",
            "source": "https://api.two.inc",
            "subject": "merchant/b6b9d5d1-f6b7-4e15-9703-9c32c6e5c1c2",
            "twomerchantid":"b6b9d5d1-f6b7-4e15-9703-9c32c6e5c1c2",
            "data": {
                "merchant_id": "b6b9d5d1-f6b7-4e15-9703-9c32c6e5c1c2",
                "merchant_legal_name": "Example Merchant Ltd",
                "merchant_country_code": "GB",
                "payee_account_country_code": "GB",
                "payee_account_invoice_type": "FUNDED_INVOICE",
        }
        ```

        #### Triggering in sandbox

        This webhook object is emitted whenever a new active payee account for country code and invoice type for a
        merchant is activated and the country invoice type combination has no other active payee accounts.
        Use case is for merchants activating a new payee account for a country and invoice type
        to inform partner merchant of activation.
      operationId: merchant_payee_account_activatedmerchant_payee_account_activated_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantPayeeAccountActivatedEvent"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  in-arrears-block:
    post:
      tags:
        - Customer
      summary: Customer In Arrears
      description: |-
        Type: `customer.in_arrears_block.v1`

        Occurs for the first 7 days when a customer enters into arrears, meaning they have an unpaid invoice
        that is more than 28 days past due and are now unable to place orders until they repay
        their most overdue invoices that meet this past 28 days condition

        #### Payload

        The `data` object in the payload contains data that indicates the customer details who has entered
        into arrears, and further details on the invoices that are most overdue if they belong to this merchant

        #### Example

        ```json
        {
            "specversion": "1.0",
            "id": "01FBJ0PYJ7931K0CJ6GMP8N3WG",
            "type": "customer.in_arrears_block.v1",
            "time": "2023-06-21T12:34:56.123456Z",
            "source": "https://api.two.inc",
            "subject": "in_arrears_block",
            "twomerchantid": "b6b9d5d1-f6b7-4e15-9703-9c32c6e5c1c2",
            "message": (
                "Two B2b LTD (13078389) is now in arrears."
                "Please see the details for the invoice that is due the earliest"
            ),
            "data": {
                "buyer_company_name": "Two B2b LTD",
                "buyer_organization_number": "13078389",
                "days_in_arrears": 5,
                "earliest_invoice_due_belongs_to_merchant": True,
                "earliest_invoice_number": "123123",
                "earliest_invoice_due_date": "2024-05-05",
                "earliest_invoice_gross_amount": 100.0,
                "earliest_invoice_currency": "GBP"
            }
        }
        ```

        #### Triggering in sandbox

        There is no active trigger to send this webhook as it runs as a cronjob on a daily
        schedule if the arrears conditions are met for any customer from this merchant.
        The SVIX portal however allows for test events to be sent to a given endpoint
      operationId: customer_in_arrearsin_arrears_block_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInArrearsBlock"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  approaching-arrears-block:
    post:
      tags:
        - Customer
      summary: Customer Approaching Arrears
      description: |-
        Type: `customer.approaching_arrears_block.v1`

        Starts occurring 7 days before a customer enters into arrears, meaning they have an unpaid invoice
        that is than 21 days or more past due and are about to be unable to place orders until they repay
        their most overdue invoices that meet this past 28 days condition

        #### Payload

        The `data` object in the payload contains data that indicates the customer details who is about to enter
        into arrears, and further details on the invoices that are most overdue if they belong to this merchant

        #### Example

        ```json
        {
            "specversion": "1.0",
            "id": "01FBJ0PYJ7931K0CJ6GMP8N3WG",
            "type": "customer.approaching_arrears_block.v1",
            "time": "2023-06-21T12:34:56.123456Z",
            "source": "https://api.two.inc",
            "subject": "approaching_arrears_block",
            "twomerchantid": "b6b9d5d1-f6b7-4e15-9703-9c32c6e5c1c2",
            "message": (
                "Two B2b LTD (13078389)  is approaching arrears with another "
                f"merchant in 5 days. Please encourage them to repay any severely "
                "overdue invoices they have to be able to place orders on your website again""
            ),
            "data": {
                "buyer_company_name": "Two B2b LTD",
                "buyer_organization_number": "13078389",
                "days_until_arrears": 5,
                "earliest_invoice_due_belongs_to_merchant": False,
                "earliest_invoice_number": None,
                "earliest_invoice_due_date": None,
                "earliest_invoice_gross_amount": None,
                "earliest_invoice_currency": None
            }
        }
        ```

        #### Triggering in sandbox

        There is no active trigger to send this webhook as it runs as a cronjob on a daily
        schedule if the arrears conditions are met for any customer from this merchant.
        The SVIX portal however allows for test events to be sent to a given endpoint
      operationId: customer_approaching_arrearsapproaching_arrears_block_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerApproachingArrearsBlock"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  exit-arrears-block:
    post:
      tags:
        - Customer
      summary: Customer Exit Arrears
      description: |-
        Type: `customer.exit_arrears_block.v1`

        This webhook occurs when a customer has been in arrears and then exits arrears by paying their
        overdue invoices, meaning they are now unblocked from using two. Merchants will receive the webhook only once

        #### Payload

        The `data` object in the payload contains the buyer company name and organization number
        of the buyer who has exited arrears.

        #### Example

        ```json
        {
            "specversion": "1.0",
            "id": "01FBJ0PYJ7931K0CJ6GMP8N3WG",
            "type": "customer.exit_arrears_block.v1",
            "time": "2023-06-21T12:34:56.123456Z",
            "source": "https://api.two.inc",
            "subject": "exit_arrears_block",
            "twomerchantid": "b6b9d5d1-f6b7-4e15-9703-9c32c6e5c1c2",
            "message": (
                "TWO B2B AS (1307839) have exited arrears and are now able to purchase with Two B2B again"
            ),
            "data": {
                "buyer_company_name": "TWO B2B AS",
                "buyer_organization_number": "13078389",
            }
        }
        ```

        #### Triggering in sandbox

        There is no active trigger to send this webhook as it runs as a cronjob on a daily
        schedule if the exit arrears conditions are met for any customer from this merchant.
        The SVIX portal however allows for test events to be sent to a given endpoint
      operationId: customer_exit_arrearsexit_arrears_block_post
