      title: ArrearsBuyerBaseEventData
      description: Base data of the buyer fo arrears event data.
    BillingStatementCreditNote:
      properties:
        refund_id:
          type: string
          title: Refund Id
          description: Unique ID of the credit note.
        credited_amount:
          type: string
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          format: decimal
          title: Credited Amount
          description: Amount applied to the statement by this credit note.
      type: object
      required:
        - refund_id
        - credited_amount
      title: BillingStatementCreditNote
    BillingStatementEvent:
      properties:
        id:
          type: string
          title: Id
          description: The event ID. Unique within the source. Can be used
            to deduplicate events.
        specversion:
          type: string
          title: Specversion
          description: The version of the CloudEvents specification.
          default: "1.0"
        source:
          type: string
          title: Source
          description: A representation of the event's originating system.
        subject:
          anyOf:
            - type: string
            - type: "null"
          title: Subject
          description: Identifies the entity that the event relates to.
        type:
          type: string
          const: billing_statement.created.v1
          title: Type
        time:
          type: string
          format: date-time
          title: Time
          description: The event timestamp.
        twomerchantid:
          anyOf:
            - type: string
            - type: "null"
          title: Twomerchantid
          description: The ID of the merchant that this event relates to.
        message:
          anyOf:
            - type: string
            - type: "null"
          title: Message
          description: Webhook notification human-friendly message.
        data:
          $ref: "#/components/schemas/BillingStatementEventData"
      type: object
      required:
        - id
        - source
        - type
        - time
        - data
      title: BillingStatementEvent
