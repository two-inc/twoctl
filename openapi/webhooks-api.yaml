                "gross_amount": "150.65",
                "invoice_amount": "150.65",
                "payable_amount": "150.65",
                "prepaid_amount": "0.00",
                "currency": "GBP"
                "buyer_company_name": "TWO B2B LTD",
                "status": "APPROVED",
                "state": "FULFILLED",
            }
