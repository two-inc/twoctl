          description: |-
            Reason why the workflow failed

                Reason for workflow failure.
                Explaination:

                - EXPIRED: The workflow was not completed within the allowed time frame.
                - REJECTED: The workflow was rejected during a review step.
                - ABANDONED: The workflow was abandoned by the user.
                - CANCELLED: The workflow was cancelled by the client
                - TECHNICAL_ERROR: The workflow failed due to a technical error in the system.
                - OTHER: The workflow failed for another reason not listed above. Default reason.
                    For forwards compatibility with adding more reasons, parsers should default to
                    this status if they don't recongnize the value.
