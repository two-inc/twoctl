                    title: Due Date
                buyer_company_name:
                    description: The name of the buyer company
                    title: Buyer Company Name
                    type: string
                payment_reference:
                    description: The payment reference of the statement
                    title: Payment Reference
                    type: string
                total_amount:
                    description: The total amount of the statement
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Total Amount
                    type: string
                outstanding_amount:
                    description: The outstanding amount of the statement
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Outstanding Amount
                    type: string
                last_downloaded:
                    anyOf:
                    -   format: date-time
                        type: string
                    -   type: 'null'
                    default: null
