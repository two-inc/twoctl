            title: Error
            type: object
        BillingAccountsQuerySchema:
            description: Query schema for billing accounts lookup by company identifiers.
            properties:
                canonical_id:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Canonical company identifier. If provided, organization_number
                        and country code are optional.
                    title: Canonical Id
                organization_number:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Organization number of the buyer. Required if canonical_id
                        is not provided.
                    title: Organization Number
                country_code:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Country code in ISO 3166-1 alpha-2 format. Required
                        if canonical_id is not provided.
                    title: Country Code
            title: BillingAccountsQuerySchema
            type: object
        BillingAccountsListResponse:
            description: Response schema for listing billing accounts
