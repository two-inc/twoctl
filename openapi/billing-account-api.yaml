                account_name:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: A name to identify the billing account
                    title: Account Name
                phone_number:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Phone number for contacting the account holder
                    title: Phone Number
                id:
                    description: A globally unique billing account ID set by Two
                    format: uuid
                    title: Id
                    type: string
            required:
            - primary_email_addresses
            - schedule
            - buyer_company
            - due_in_days
            - currency
            - id
            title: BillingAccountResponse
            type: object
        UpdateBillingAccountRequest:
            properties:
                due_in_days:
                    anyOf:
                    -   maximum: 60
                        minimum: 5
                        type: integer
                    -   type: 'null'
                    default: null
                    description: Due in days to allow for the monthly billing schedule,
                        can be greater than or equal to 5 and less than or equal to
                        60
                    title: Due In Days
                generation_delay_days:
                    anyOf:
                    -   minimum: 0
                        type: integer
                    -   type: 'null'
                    default: 4
                    description: Number of days to delay the grouped invoice being
                        sent out
                    title: Generation Delay Days
                primary_email_addresses:
                    anyOf:
                    -   items:
                            format: email
                            type: string
                        minItems: 1
                        type: array
                    -   type: 'null'
                    default: null
                    description: List of email addresses set to receive billing account
                        emails
                    title: Primary Email Addresses
                cc_email_addresses:
                    anyOf:
                    -   items:
                            format: email
                            type: string
                        type: array
                    -   type: 'null'
                    default: null
                    description: List of CC email addresses set to receive billing
                        account emails
                    title: Cc Email Addresses
                account_name:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: A name to identify the billing account
                    title: Account Name
                phone_number:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Phone number for contacting the account holder
                    title: Phone Number
            title: UpdateBillingAccountRequest
            type: object
        Error:
            properties:
