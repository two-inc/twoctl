                    title: Last Downloaded
            required:
            - statement_id
            - statement_number
            - statement_suffix
            - statement_reference
            - statement_creation_reason
            - issue_date
            - buyer_company_name
            - payment_reference
            - total_amount
            - outstanding_amount
