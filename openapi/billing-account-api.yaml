            - start_date
            - currency
            - totals
            - statements
            - bank_account
            title: BillingPeriodStatementsSummaryResponse
            type: object
        BillingPeriodBankAccountSchema:
            description: Bank account details for the expected payment for the billing
                period oustanding amount
            properties:
                payment_reference:
                    description: The payment reference that should be use for bank
                        transfer
                    title: Payment Reference
                    type: string
                account_name:
                    description: The recipient account name
                    title: Account Name
                    type: string
                account_number:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    title: Account Number
                sort_code:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    title: Sort Code
                iban:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    title: Iban
                bban:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    title: Bban
                bic:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    title: Bic
            required:
            - payment_reference
            - account_name
            title: BillingPeriodBankAccountSchema
            type: object
        BillingStatementTotalsSchema:
            description: The totals of all statements in the billing period.
            properties:
                invoiced_amount:
                    description: The total amount invoiced in the given billing period
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Invoiced Amount
                    type: string
                paid_amount:
                    description: Total amount paid in the given billing period
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Paid Amount
                    type: string
                credited_amount:
                    description: Total amount credited in the given billing period
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Credited Amount
                    type: string
                collected_amount:
                    description: Total amount collected in the given billing period
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Collected Amount
                    type: string
                recoursed_amount:
                    description: Total amount recoursed in the given billing period
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Recoursed Amount
                    type: string
                outstanding_amount:
                    description: Total outstanding amount in the given billing period
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Outstanding Amount
                    type: string
                last_updated:
                    description: The last time the totals were updated
                    format: date-time
                    title: Last Updated
                    type: string
            required:
            - invoiced_amount
            - paid_amount
            - credited_amount
            - collected_amount
            - recoursed_amount
            - outstanding_amount
            - last_updated
            title: BillingStatementTotalsSchema
            type: object
        StatementsSummarySchema:
            description: An overview of a single statement within a given billing
