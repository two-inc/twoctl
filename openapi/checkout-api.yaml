            - buyer_country_code
            - approved_on_recourse
            - gross_amount
            title: OrderFeeRequestSchema
            type: object
        BuyerFeeShareSchema:
            additionalProperties: false
            description: API-facing schema — adds reference_terms with mutual exclusion
                against threshold.
            properties:
                threshold:
                    anyOf:
                    -   format: decimal
                        ge: '0'
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: Fee amount below which the percentage is not applied.
                        Only the portion of your total fee above this value is eligible
                        to be recharged to the buyer via the percentage field. Either
                        threshold or reference_terms may be specified, but not both.
                    examples:
                    - '0'
                    title: Threshold
                percentage:
                    anyOf:
                    -   maximum: 100.0
                        minimum: 0.0
                        type: number
                    -   pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
                        type: string
                    default: '100'
                    description: Percentage of the applicable fee you want to pass
                        to the buyer (0-100). Defaults to 100.
                    examples:
                    - '100.00'
                    title: Percentage
                surcharge:
                    anyOf:
                    -   format: decimal
                        ge: '0'
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: Flat amount added to the buyer fee share, in addition
                        to any percentage of your total fee. The surcharge_basis field
                        controls whether this is the amount the buyer is charged on
                        the line item (`buyer_pays`, the default) or the amount you
                        net after Two's fees (`merchant_receives`). Applied before
                        the cap. Ignored when gross_amount is 0.
                    examples:
                    - '5.00'
                    title: Surcharge
                surcharge_basis:
                    $ref: '#/components/schemas/SurchargeBasis'
                    default: buyer_pays
                    description: 'How to interpret the surcharge value. `buyer_pays`
                        (default): the configured amount is what the buyer is charged
                        as a line item; you absorb the variable fee Two applies to
                        that line item. `merchant_receives`: the configured amount
                        is what you net after Two''s fees; the buyer line item is
                        grossed up so the fee on the line item does not reduce your
                        receipt.'
                    examples:
                    - buyer_pays
                cap:
                    anyOf:
                    -   format: decimal
                        ge: '0'
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: Upper limit on the final buyer fee share line item
                        (post-gross-up, post-surcharge). If the computed share would
                        exceed this amount, it is clamped to cap and you absorb the
                        remainder. None means no cap.
                    examples:
                    - '50.00'
                    title: Cap
                reference_terms:
                    anyOf:
                    -   description: For backwards compatibility, `type` can be omitted
                            for instalment terms, if the fields period and number_of_instalments
                            are populated. It is recommended that that clients always
                            provide a type value.
                        discriminator:
                            mapping:
                                INSTALMENTS: '#/components/schemas/OrderInstalmentTerms'
                                NET_TERMS: '#/components/schemas/OrderNetTerms'
                            propertyName: type
                        oneOf:
                        -   $ref: '#/components/schemas/OrderInstalmentTerms'
                        -   $ref: '#/components/schemas/OrderNetTerms'
                    -   type: 'null'
                    default: null
                    description: Baseline terms used to compute the threshold automatically.
                        The buyer only pays the fee difference between the order's
                        terms and these baseline terms — use this when you want to
                        absorb the fee for a standard payment option and pass on only
                        the incremental cost of longer terms. Either threshold or
                        reference_terms may be specified, but not both.
                    examples:
                    -   duration_days: 30
                        type: NET_TERMS
                    title: Reference Terms
            title: BuyerFeeShareSchema
            type: object
        InternalBuyerFeeShareSchema:
            additionalProperties: false
            description: Resolved buyer fee share config — reference_terms already
                converted to a threshold.
            properties:
                threshold:
                    anyOf:
                    -   format: decimal
                        ge: '0'
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: Fee amount below which the percentage is not applied.
                        Only the portion of your total fee above this value is eligible
                        to be recharged to the buyer via the percentage field. Either
                        threshold or reference_terms may be specified, but not both.
                    examples:
                    - '0'
                    title: Threshold
                percentage:
                    anyOf:
                    -   maximum: 100.0
                        minimum: 0.0
                        type: number
                    -   pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
                        type: string
                    default: '100'
                    description: Percentage of the applicable fee you want to pass
                        to the buyer (0-100). Defaults to 100.
                    examples:
                    - '100.00'
                    title: Percentage
                surcharge:
                    anyOf:
                    -   format: decimal
                        ge: '0'
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: Flat amount added to the buyer fee share, in addition
                        to any percentage of your total fee. The surcharge_basis field
                        controls whether this is the amount the buyer is charged on
                        the line item (`buyer_pays`, the default) or the amount you
                        net after Two's fees (`merchant_receives`). Applied before
                        the cap. Ignored when gross_amount is 0.
                    examples:
                    - '5.00'
                    title: Surcharge
                surcharge_basis:
                    $ref: '#/components/schemas/SurchargeBasis'
                    default: buyer_pays
                    description: 'How to interpret the surcharge value. `buyer_pays`
                        (default): the configured amount is what the buyer is charged
                        as a line item; you absorb the variable fee Two applies to
                        that line item. `merchant_receives`: the configured amount
                        is what you net after Two''s fees; the buyer line item is
                        grossed up so the fee on the line item does not reduce your
                        receipt.'
                    examples:
                    - buyer_pays
                cap:
                    anyOf:
                    -   format: decimal
                        ge: '0'
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: Upper limit on the final buyer fee share line item
                        (post-gross-up, post-surcharge). If the computed share would
                        exceed this amount, it is clamped to cap and you absorb the
                        remainder. None means no cap.
                    examples:
                    - '50.00'
                    title: Cap
            title: InternalBuyerFeeShareSchema
            type: object
        SurchargeBasis:
            description: Perspective from which a buyer fee share surcharge amount
                is interpreted.
            enum:
            - merchant_receives
            - buyer_pays
            title: SurchargeBasis
            type: string
        PricingOrderFeeResponseSchema:
            properties:
                currency:
                    $ref: '#/components/schemas/CurrencyEnum'
                    description: ISO 4217 currency code that total_fee and buyer_fee_share
                        are denominated in. Echoes the currency sent on the request
                        when provided, otherwise the merchant's configured fee_currency.
                    examples:
                    - NOK
                total_fee:
                    anyOf:
                    -   type: number
                    -   pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
                        type: string
                    description: Estimated fee for the provided gross_amount and terms,
                        assuming no buyer_fee_share line item is added to the order.
                        If you add buyer_fee_share to the invoice, the order total
                        will grow by that amount and the fee Two actually charges
                        will be higher than total_fee; buyer_fee_share already accounts
                        for that increase so the merchant nets the intended amount.
                    examples:
                    - '44.29'
                    title: Total Fee
                fixed_fee:
                    anyOf:
                    -   type: number
                    -   pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
                        type: string
                    description: Flat per-order fee component applied to this quote,
                        in `currency`.
                    examples:
                    - '1.00'
                    title: Fixed Fee
                percentage_fee:
                    anyOf:
                    -   type: number
                    -   pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
                        type: string
                    description: 'Variable-rate component applied to this quote, in
                        percent units (e.g. `1.44` means 1.44%). For a non-instalment
                        order: total_fee == fixed_fee + gross_amount * percentage_fee
                        / 100.'
                    examples:
                    - '1.44'
                    title: Percentage Fee
                buyer_fee_share:
                    anyOf:
                    -   type: number
                    -   pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
                        type: string
                    description: Amount to add to the order as an additional line
                        item (paid by the buyer) if you want to recover some or all
                        of the merchant fee. This may exceed total_fee — the line
                        item itself attracts Two's variable fee, so the amount is
                        grossed up to deliver the merchant's intended net. Zero when
                        buyer_fee_share is omitted from the request.
                    examples:
                    - '46.35'
                    title: Buyer Fee Share
                total_fee_tax_rate:
                    description: Tax rate applied to total_fee.
                    examples:
                    - '0.000000'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,6})?
                    title: Total Fee Tax Rate
                    type: string
                pricing_package_id:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Pricing package ID used for this quote.
                    title: Pricing Package Id
                pricing_package_revision:
                    anyOf:
                    -   type: integer
                    -   type: 'null'
                    default: null
                    description: Pricing package revision used for this quote.
                    title: Pricing Package Revision
                pricing_package_metadata:
                    anyOf:
                    -   $ref: '#/components/schemas/PricingPackageMetadataSchema'
                    -   type: 'null'
                    default: null
                    description: 'Rate-card breakdown for this quote: which net-days
                        and cycle-length buckets fired and their individual rates.
                        Null when the fee came from an override or legacy merchant
                        fallback rather than a pricing package.'
            required:
            - currency
            - total_fee
            - fixed_fee
            - percentage_fee
            - buyer_fee_share
            - total_fee_tax_rate
            title: PricingOrderFeeResponseSchema
            type: object
        PricingPackageMetadataSchema:
            properties:
                pricing_package_id:
                    title: Pricing Package Id
                    type: string
                pricing_package_revision:
                    title: Pricing Package Revision
                    type: integer
                buyer_country_code:
                    title: Buyer Country Code
                    type: string
                net_days_category:
                    title: Net Days Category
                    type: string
                net_days_rate:
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,6})?
                    title: Net Days Rate
                    type: string
                cycle_length_category:
                    title: Cycle Length Category
                    type: string
                cycle_length_rate:
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,6})?
                    title: Cycle Length Rate
                    type: string
            required:
            - pricing_package_id
            - pricing_package_revision
            - buyer_country_code
            - net_days_category
            - net_days_rate
            - cycle_length_category
            - cycle_length_rate
            title: PricingPackageMetadataSchema
            type: object
        PaymentLinkResponseSchema:
