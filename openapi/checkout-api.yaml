                    -   type: integer
                    -   type: 'null'
                    default: null
                    title: Invoice Due In Days
                gross_amount:
                    anyOf:
                    -   minimum: 0.0
                        type: number
                    -   pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
                        type: string
                    title: Gross Amount
                order_terms:
                    anyOf:
                    -   description: For backwards compatibility, `type` can be omitted
                            for instalment terms, if the fields period and number_of_instalments
                            are populated. It is recommended that that clients always
                            provide a type value.
                        discriminator:
                            mapping:
                                INSTALMENTS: '#/components/schemas/OrderInstalmentTerms'
                                NET_TERMS: '#/components/schemas/OrderNetTerms'
                            propertyName: type
                        oneOf:
                        -   $ref: '#/components/schemas/OrderInstalmentTerms'
                        -   $ref: '#/components/schemas/OrderNetTerms'
                    -   type: 'null'
                    default: null
                    title: Order Terms
                buyer_fee_share:
                    anyOf:
                    -   $ref: '#/components/schemas/BuyerFeeShareSchema'
                    -   $ref: '#/components/schemas/InternalBuyerFeeShareSchema'
                    -   type: 'null'
                    default: null
                    title: Buyer Fee Share
                currency:
                    anyOf:
                    -   $ref: '#/components/schemas/CurrencyEnum'
                    -   type: 'null'
                    default: null
                    description: ISO 4217 currency code that the monetary values in
                        this request are denominated in. Applies to gross_amount and
                        all amounts under buyer_fee_share (threshold, surcharge, cap).
                        When omitted, the merchant's configured fee_currency is assumed.
                        The response always echoes the resolved currency so the caller
                        can verify.
