        CreateOrderIntentRequestSchema:
            example:
                buyer:
                    company:
                        company_name: TWO B2B LTD
                        country_prefix: GB
                        organization_number: '13078389'
                    representative:
                        email: john.doe@twob2bltd.com
                        first_name: John
                        last_name: Doe
                        phone_number: '+447516498321'
                currency: GBP
                gross_amount: '120'
                line_items:
                -   description: Blue whale poster
                    details:
                        barcodes:
                        -   type: SKU
                            value: 5954d9e0-ebfb-4498-86a9-3141e8942dc8
                        -   type: UPC
                            value: cece4007-028c-469c-b0d2-2c038b583b69
                        brand: Whale Posters INC
                        categories:
                        - Art
                        - Home
                        part_number: n/a
                    discount_amount: '0'
                    gross_amount: '120'
                    image_url: https://www.exampleobjects.com/product-image-800x600
                    name: Whale poster
                    net_amount: '100'
                    product_page_url: https://www.example.com/products/7e34f2a8d
                    quantity: 1.0
                    quantity_unit: pcs
                    tax_amount: '20'
                    tax_class_name: VAT 20%
                    tax_rate: '0.2'
                    type: PHYSICAL
                    unit_price: '100'
                merchant_id: 32d8eb3f-8ac3-4aca-82b9-dbbd6f416cfb
                order_origination: ONLINE
            properties:
                gross_amount:
                    description: net_amount + tax_amount
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Gross Amount
                    type: string
                net_amount:
                    anyOf:
                    -   format: decimal
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: Net amount is optional but helpful for accurate assessment
                        of order intents. If not provided, assessment will be conducted
                        based on gross amount only.
                    title: Net Amount
                tax_amount:
                    anyOf:
                    -   format: decimal
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: net_amount * tax_rate
                    title: Tax Amount
                invoice_type:
                    anyOf:
                    -   $ref: '#/components/schemas/InvoiceTypeEnum'
                    -   type: 'null'
                    default: null
                    deprecated: true
                    description: 'FUNDED_INVOICE: Two will handle the invoice and
                        transfer the funds to the merchant as per the factoring agreement.
                        The invoice_details field will be populated by Two. DIRECT_INVOICE:
                        Two generates and sends the invoice to the customer based
                        on the bank account provided by the merchant, but the merchant
                        takes the full credit and fraud risk on direct invoices and
                        they will not receive a payout.'
                currency:
                    description: Currency code in ISO 4217 format. E.g. 'NOK'
                    title: Currency
                    type: string
                line_items:
                    description: List of the line items that constitute the order.
                    items:
                        $ref: '#/components/schemas/LineItemRequestSchema'
                    title: Line Items
                    type: array
                buyer:
                    anyOf:
                    -   $ref: '#/components/schemas/LaxRepBuyerSchema'
                    -   $ref: '#/components/schemas/SuperLaxRepBuyerSchema'
                    -   $ref: '#/components/schemas/BuyerSchemaForOrderIntentCreation'
                    description: Fields representing the buyer. Some elements are
                        optional. Providing optional information enables a more accurate
                        evaluation of the buyer.
                    title: Buyer
                merchant_id:
                    anyOf:
                    -   format: uuid
                        type: string
                    -   type: 'null'
                    default: null
                    description: A globally unique merchant ID set by Two.
                    title: Merchant Id
                merchant_short_name:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    deprecated: true
                    description: Deprecated in favor of merchant_id.
                    title: Merchant Short Name
                shipping_address:
                    anyOf:
                    -   $ref: '#/components/schemas/CreateAddressRequestSchema'
                    -   type: 'null'
                    default: null
                    description: Order shipping address. Optional. Providing this
                        information enables a more accurate evaluation of the buyer.
                order_origination:
                    anyOf:
                    -   $ref: '#/components/schemas/OrderOriginationEnum'
                    -   type: 'null'
                    default: null
                    description: IN_STORE orders are not enabled by default. Please
                        reach out to us if you would like to discuss IN_STORE orders.
                terms:
                    anyOf:
                    -   description: For backwards compatibility, `type` can be omitted
                            for instalment terms, if the fields period and number_of_instalments
                            are populated. It is recommended that that clients always
                            provide a type value.
                        discriminator:
                            mapping:
                                INSTALMENTS: '#/components/schemas/OrderInstalmentTerms'
                                NET_TERMS: '#/components/schemas/OrderNetTerms'
                            propertyName: type
                        oneOf:
                        -   $ref: '#/components/schemas/OrderInstalmentTerms'
                        -   $ref: '#/components/schemas/OrderNetTerms'
                    -   type: 'null'
                    default: null
                    description: The terms of this order
                    title: Terms
                credit_line_id:
                    anyOf:
                    -   format: uuid
                        type: string
                    -   type: 'null'
                    default: null
                    description: ID of the credit line used to fund the order, created
                        through the Two Credit Line API.
                    title: Credit Line Id
            required:
            - gross_amount
            - currency
            - line_items
            - buyer
            title: CreateOrderIntentRequestSchema
            type: object
        BarCodeSchema:
            properties:
                value:
                    description: The identifier as a string
                    title: Value
                    type: string
                type:
                    description: Type of the identifier. Can be either "SKU" or a
                        Global Trade Item Number (GTIN) type like "UPC", "EAN", "GS1".
                    title: Type
                    type: string
            required:
            - value
            - type
            title: BarCodeSchema
            type: object
        BuyerSchemaForOrderIntentCreation:
            description: |-
                A schema for specifying the buyer in an order intent. The user is encouraged to specify the buyer's company
                using CompanyCanonicalIdSchema for unambiguous identification.
            properties:
                representative:
                    anyOf:
                    -   $ref: '#/components/schemas/LaxRepresentativeSchema'
                    -   additionalProperties: true
                        type: object
                    -   type: 'null'
                    default: null
                    description: Fields to capture who the order is for
                    title: Representative
                company:
                    description: Fields to capture the details of the company for
                        which the order is intended. Users are encouraged to assign
                        a CompanyFromCanonicalIdRequestSchema instance to this field
                        using a canonical id retrieved from our company search API.
                    oneOf:
                    -   $ref: '#/components/schemas/CompanyCanonicalIdSchema'
                    -   $ref: '#/components/schemas/CompanySchema'
                    -   type: 'null'
                    title: Company
            required:
            - company
            title: BuyerSchemaForOrderIntentCreation
            type: object
        CompanyCanonicalIdSchema:
            additionalProperties: false
            description: |-
                A schema that represents a company only by its canonical ID.
                Intended for use in requests to our API to create order intents and orders.
                Use the Two Company Search API to retrieve the canonical_id for a company.

                IMPORTANT: This schema forbids extra fields to prevent silent data loss.
                If additional company fields are provided, use CompanySchema instead.
            properties:
                company_canonical_id:
                    description: Unique canonical ID representing this company. Retrieve
                        this from the Two Company Search API.
                    examples:
                    - abc123def456
                    - ST987xyz
                    pattern: ^[a-zA-Z0-9]+$
                    title: Company Canonical Id
                    type: string
            required:
            - company_canonical_id
            title: CompanyCanonicalIdSchema
            type: object
        CompanySchema:
            description: |-
                Standard company schema with required fields for full company identification.
                Extends NonStrictCompanySchema and makes key fields required.
            properties:
                id:
                    anyOf:
                    -   format: uuid
                        type: string
                    -   type: 'null'
                    default: null
                    description: Internal company Id
                    title: Id
                country_prefix:
                    $ref: '#/components/schemas/CountryCodeEnum'
                    description: Country code in ISO 3166-1 alpha-2 format
                    examples:
                    - GB
                organization_number:
                    description: National id of the buyer company
                    title: Organization Number
                    type: string
                company_name:
