                    type: string
            required:
            - id
            - hint
            - label
            - date_created
            - usage_count
            - merchant_id
            title: MerchantAPIKeyResponseSchema
            type: object
        PaginatedSettlementListCursorSchema:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/Settlement'
                    title: Items
                    type: array
                cursor_page_metadata:
                    $ref: '#/components/schemas/CursorPageMetadata'
            required:
            - items
            - cursor_page_metadata
            title: PaginatedSettlementListCursorSchema
            type: object
        CursorPageMetadata:
            properties:
                previous_page_cursor:
                    anyOf:
                    -   minLength: 1
                        type: string
                    -   type: 'null'
                    default: cursor to the previous page
                    title: Previous Page Cursor
                next_page_cursor:
                    anyOf:
                    -   minLength: 1
                        type: string
                    -   type: 'null'
                    default: cursor to the next page
                    title: Next Page Cursor
                limit:
                    description: The maximum number of items on a single page, ie
                        the page size.
                    minimum: 0
                    title: Limit
                    type: integer
            required:
            - limit
            title: CursorPageMetadata
            type: object
        Settlement:
            properties:
                settlement_id:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: The global settlement ID.
                    title: Settlement Id
                settlement_date:
                    anyOf:
                    -   format: date
                        type: string
                    -   type: 'null'
                    default: null
                    description: Date of the settlement payout
                    title: Settlement Date
                recipient_account_number:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Recipient account number.
                    title: Recipient Account Number
                recipient_account_name:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Recipient account name.
                    title: Recipient Account Name
                recipient_iban:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Recipient account IBAN.
                    title: Recipient Iban
                recipient_bban:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Recipient account BBAN.
                    title: Recipient Bban
                funding_provider:
                    description: Funding provider
                    title: Funding Provider
                    type: string
                funding_provider_account_holder_name:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Funding provider account name.
                    title: Funding Provider Account Holder Name
                funding_provider_account_number:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Funding provider account number.
                    title: Funding Provider Account Number
                payout_currency:
                    $ref: '#/components/schemas/CurrencyEnum'
                    description: Payout currency.
                    examples:
                    - GBP
                payout_amount:
                    anyOf:
                    -   format: decimal
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: Payout amount.
                    examples:
                    - '10000.00'
                    title: Payout Amount
                payment_reference:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Payment reference.
                    title: Payment Reference
            required:
            - funding_provider
            - payout_currency
            title: Settlement
            type: object
        GetStatementRequestQuerySchema:
            properties:
                start_date:
                    description: The first date that should be included in the statement.
                    examples:
                    - '2023-01-01'
                    title: Start Date
                    type: string
                end_date:
                    description: The last date that should be included in the statement.
                    examples:
                    - '2023-01-31'
                    title: End Date
                    type: string
                filetype:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: xlsx
                    description: The filetype of the statement file. Two currently
                        supports csv and xlsx as value for the filetype parameter.
                        Default is xlsx.
                    title: Filetype
                country_code:
                    default: 'NO'
                    description: The country code of the payout account you want to
                        extract a settlement file for. Country code in ISO 3166 alpha-2
                        format
                    examples:
                    - GB
                    title: Country Code
                    type: string
            required:
            - start_date
            - end_date
            title: GetStatementRequestQuerySchema
            type: object
        ReconOutcomeEventsRequestSchema:
            properties:
                transactions:
                    description: 'List of transactions e.g: Payin, credit notes and
                        credit losses for the given order ID.'
                    items:
                        $ref: '#/components/schemas/ReconOutcomeEventSchema'
                    minItems: 1
                    title: Transactions
                    type: array
            required:
            - transactions
            title: ReconOutcomeEventsRequestSchema
            type: object
        ReconOutcomeEventSchema:
            properties:
                id:
                    description: Reference ID of this specific event in your system.
                    title: Id
                    type: string
                type:
                    anyOf:
                    -   $ref: '#/components/schemas/ReconOutcomeEventTypeEnum'
                    -   type: 'null'
                    description: This event type can be either Payin, Credit Note,
                        or Credit Loss
                amount:
                    anyOf:
                    -   format: decimal
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    description: Non-negative amount to be reconciled against this
                        event
                    title: Amount
                time:
                    anyOf:
                    -   format: date-time
                        type: string
                    -   type: 'null'
                    description: Datetime for the event occured (UTC)
                    title: Time
            required:
            - id
            - type
            - amount
            - time
            title: ReconOutcomeEventSchema
            type: object
        ReconOutcomeEventTypeEnum:
            enum:
            - PAYIN
            - CREDIT_NOTE
            - CREDIT_LOSS
            title: ReconOutcomeEventTypeEnum
            type: string
    securitySchemes:
        X-Api-Key:
            type: apiKey
            description: |-
                For instructions on how to obtain API keys, visit [this page](/docs/guides/getting-api-keys-page/).
                You will obtain two different keys, an initial one for testing in our sandbox environment and once ready, for production.
                Your API keys enables others to act on your behalf if they are able to obtain them, so make sure to keep them safe.
                Your API key is not to be shared with anyone, including in your version control system, client-side code, in public chatrooms and so on.
                The API key is applied in the request header. For example:
                ```
                GET /something
                X-Api-Key: secret_test_aabbccddeeff0123456789
                ```

                API Keys have the following structure: `secret_<env>_<key>` where:
                - `env` is determined by the environment (`prod` for production, `test` for test environments)
                - `key` is a random, URL-safe, 64-bit encoded text string containing 32 random bytes.
            name: X-Api-Key
            in: header
servers:
-   url: https://api.sandbox.two.inc
    description: Testing
-   url: https://api.two.inc
    description: Production
security: []
