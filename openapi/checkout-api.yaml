                    - '100.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Net Amount
                    type: string
                quantity:
                    description: Number of units for the specific line item (up to
                        8 decimal places)
                    examples:
                    - '1'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,8})?
                    title: Quantity
                    type: string
                unit_price:
                    description: The price of one unit excluding tax and discount
                        (up to 6 decimal places)
                    examples:
                    - '100.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,6})?
                    title: Unit Price
                    type: string
                tax_amount:
                    description: net_amount * tax_rate
                    examples:
                    - '0.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Tax Amount
                    type: string
                tax_rate:
                    description: Tax rate on the line item level
                    examples:
                    - '0.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,6})?
                    title: Tax Rate
                    type: string
                tax_class_name:
                    description: A description of the tax class (e.g. 'VAT 20%')
                    examples:
                    - VAT 0%
                    title: Tax Class Name
                    type: string
                quantity_unit:
                    description: Unit like kg, l, pcs, etc.
                    examples:
                    - pcs
                    title: Quantity Unit
                    type: string
                image_url:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Link to the image of the product.
                    title: Image Url
                product_page_url:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Link to the store product page.
                    title: Product Page Url
                type:
                    $ref: '#/components/schemas/LineItemTypeEnum'
                    description: Product type.
                    examples:
                    - PHYSICAL
                details:
                    anyOf:
                    -   $ref: '#/components/schemas/ProductDetailsSchema'
                    -   type: 'null'
                    default: null
                    description: Meta-information and identifiers for the line item.
                prototype_id:
                    anyOf:
                    -   format: uuid
                        type: string
                    -   type: 'null'
                    default: null
                    description: Prototype id
                    title: Prototype Id
                vendor_name:
                    anyOf:
                    -   minLength: 1
                        type: string
                    -   type: 'null'
                    default: null
                    description: Vendor for line item
                    title: Vendor Name
                merchant_child_order_id:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: In the case that the order created with Two is used
                        to cover multiple orders on the merchant's side, this field
                        could be referencing the merchant order that each line item
                        originates from. This is analogous to how the merchant_order_id
                        on the order itself can be used to map a Two order one-to-one
                        with a merchant order. Depending on your configuration with
                        Two, line items may be grouped by this value in the resulting
                        invoice and the value may be rendered as a reference for each
                        group of line items. In marketplace situations (multiple sub-vendors),
                        this is typically combined with the vendor_name field on the
                        line item, to indicate a vendor per child order.
                    title: Merchant Child Order Id
            required:
            - name
            - description
            - gross_amount
            - net_amount
            - quantity
            - unit_price
            - tax_amount
            - tax_rate
            - tax_class_name
            - quantity_unit
            - type
            title: LineItemResponseSchema
            type: object
        RepresentativeSchema:
            properties:
                first_name:
                    description: Representative first name
                    examples:
                    - John
                    title: First Name
                    type: string
                last_name:
                    description: Representative last name
                    examples:
                    - Doe
                    title: Last Name
                    type: string
                phone_number:
                    description: Representative phone number. If the calling code
                        is not provided, it automatically uses the calling code of
                        the enum `country_prefix` in CompanySchema. However, you can
                        also specify the calling code explicitly if it's for a different
                        country. For instance, if the given phone number is 07807039055
                        and the buyer's `country_prefix` in CompanySchema is `GB`,
                        the phone number is automatically converted to +447807039055.
                        If the `country_prefix` in CompanySchema is `NO`, you can
                        explicitly define a phone number for another country as +447807039055.
                    examples:
                    - 07807039055
                    - '+447807039055'
                    title: Phone Number
                    type: string
                email:
                    anyOf:
                    -   format: email
                        type: string
                    -   type: 'null'
                    default: null
                    description: Representative email address
                    examples:
                    - johndoe0112358@gmail.com
                    title: Email
            required:
            - first_name
            - last_name
            - phone_number
            title: RepresentativeSchema
            type: object
