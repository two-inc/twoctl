            description: |-
                Response schema for successful invoice creation operation.

                Returns the ID of the order in FULFILLING state that represents the invoice.
            properties:
                id:
                    description: UUID of the order in FULFILLING state representing
                        the created invoice
                    title: Id
                    type: string
            required:
            - id
            title: InvoiceCreationResponseSchema
            type: object
