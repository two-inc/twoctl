                merchant_order_id:
                    description: Merchant order ID for the invoice.
                    title: Merchant Order Id
                    type: string
                merchant_reference:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Optional merchant reference for the invoice
                    title: Merchant Reference
            required:
            - order_ids
            - merchant_order_id
            title: InvoiceCreationRequestSchema
            type: object
