        LaxRepBuyerSchema:
            description: |-
                A buyer schema variant used for creating order intents. It allows for an optional
                and less-strict `representative` (`LaxRepresentativeSchema`).
                The company can be identified by full details (`CompanySchema`) or by `company_canonical_id`
                (`CompanyFromCanonicalIdSchema`).
            properties:
                representative:
                    anyOf:
                    -   $ref: '#/components/schemas/LaxRepresentativeSchema'
                    -   type: 'null'
                    default: null
                    description: Fields to capture who the order is for
                company:
                    $ref: '#/components/schemas/CompanySchema'
                    description: Fields to capture the details of the company for
                        which the order is intended
            required:
            - company
            title: LaxRepBuyerSchema
            type: object
        LaxRepresentativeSchema:
            description: |-
                Relaxes validation on the representative's phone number by accepting a plain string
                instead of enforcing the strict `PhoneNumberType` validation.
            properties:
                first_name:
                    description: Representative first name
                    examples:
                    - John
                    title: First Name
                    type: string
                last_name:
                    description: Representative last name
                    examples:
                    - Doe
                    title: Last Name
                    type: string
                phone_number:
                    description: Representative phone number
                    examples:
                    - 07807039055
                    - '+447807039055'
                    title: Phone Number
                    type: string
                email:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Representative email address
                    examples:
                    - johndoe0112358@gmail.com
                    title: Email
            required:
            - first_name
            - last_name
            - phone_number
            title: LaxRepresentativeSchema
            type: object
        LineItemRequestSchema:
            properties:
                name:
                    description: Short name of the product
                    title: Name
                    type: string
                description:
                    description: Longer product description
                    title: Description
                    type: string
                line_item_reference:
                    anyOf:
                    -   minLength: 1
                        pattern: ^[0-9A-Za-z_-]*$
                        type: string
                    -   type: 'null'
                    default: null
                    description: Your line item reference
                    title: Line Item Reference
                discount_amount:
                    default: '0.00'
                    description: Discount applied to line item (defaults to 0.0),
                        excluded tax
                    examples:
                    - '0.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Discount Amount
                    type: string
                gross_amount:
                    description: net_amount + tax_amount
                    examples:
                    - '100.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Gross Amount
                    type: string
                net_amount:
                    description: (quantity * unit_price) - discount_amount
                    examples:
                    - '100.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Net Amount
                    type: string
                quantity:
                    description: Number of units for the specific line item (up to
                        8 decimal places)
                    examples:
                    - '1'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,8})?
                    title: Quantity
                    type: string
                unit_price:
                    description: The price of one unit excluding tax and discount
                        (up to 6 decimal places)
                    examples:
                    - '100.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,6})?
                    title: Unit Price
                    type: string
                tax_amount:
                    description: net_amount * tax_rate
                    examples:
                    - '0.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Tax Amount
                    type: string
                tax_rate:
                    description: Tax rate on the line item level
                    examples:
                    - '0.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,6})?
                    title: Tax Rate
                    type: string
                tax_class_name:
                    description: A description of the tax class (e.g. 'VAT 20%')
                    examples:
                    - VAT 0%
                    title: Tax Class Name
                    type: string
                quantity_unit:
                    description: Unit like kg, l, pcs, etc.
                    examples:
                    - pcs
                    title: Quantity Unit
                    type: string
                image_url:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Link to the image of the product.
                    title: Image Url
                product_page_url:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Link to the store product page.
                    title: Product Page Url
                type:
                    $ref: '#/components/schemas/LineItemTypeEnum'
                    description: Product type.
                    examples:
                    - PHYSICAL
                details:
                    anyOf:
                    -   $ref: '#/components/schemas/ProductDetailsSchema'
                    -   type: 'null'
                    default: null
                    description: Meta-information and identifiers for the line item.
                prototype_id:
                    anyOf:
                    -   format: uuid
                        type: string
                    -   type: 'null'
                    default: null
                    description: Prototype id
                    title: Prototype Id
                vendor_name:
                    anyOf:
                    -   minLength: 1
                        type: string
                    -   type: 'null'
                    default: null
                    description: Vendor for line item
                    title: Vendor Name
                merchant_child_order_id:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: In the case that the order created with Two is used
                        to cover multiple orders on the merchant's side, this field
                        could be referencing the merchant order that each line item
                        originates from. This is analogous to how the merchant_order_id
                        on the order itself can be used to map a Two order one-to-one
                        with a merchant order. Depending on your configuration with
                        Two, line items may be grouped by this value in the resulting
                        invoice and the value may be rendered as a reference for each
                        group of line items. In marketplace situations (multiple sub-vendors),
                        this is typically combined with the vendor_name field on the
                        line item, to indicate a vendor per child order.
                    title: Merchant Child Order Id
            required:
            - name
            - description
            - gross_amount
            - net_amount
            - quantity
            - unit_price
            - tax_amount
            - tax_rate
            - tax_class_name
            - quantity_unit
            - type
            title: LineItemRequestSchema
            type: object
        LineItemTypeEnum:
            enum:
            - DIGITAL
            - PHYSICAL
            - SHIPPING_FEE
            - GIFTCARD
            - SERVICE
            - BUYER_FEE
            - OTHER
            title: LineItemTypeEnum
            type: string
        OrderInstalmentTerms:
            description: By setting these fields, a merchant can create an instalment
                order with the specified terms.
            properties:
                type:
                    const: INSTALMENTS
                    default: INSTALMENTS
                    title: Type
                    type: string
                period:
                    $ref: '#/components/schemas/TermsPeriod'
                    description: The period of the instalment order.
                    examples:
                    - MONTHLY
                number_of_instalments:
                    description: The number of instalments the order will be split
                        into.
                    examples:
                    - 3
                    exclusiveMinimum: 1
                    title: Number Of Instalments
                    type: integer
            required:
            - period
            - number_of_instalments
            title: OrderInstalmentTerms
            type: object
        OrderNetTerms:
            description: By setting these fields, a merchant can create an net terms
                order with specified terms.
            properties:
                type:
                    const: NET_TERMS
                    default: NET_TERMS
                    title: Type
                    type: string
                duration_days:
                    examples:
                    - 60
                    exclusiveMinimum: 0
                    title: Duration Days
                    type: integer
                duration_days_calculated_from:
                    anyOf:
                    -   $ref: '#/components/schemas/DueDateCalculationScheme'
                    -   type: 'null'
                    default: null
                    description: |-
                        Optional scheme for calculating the invoice due date. When set, modifies how due_in_days is calculated from the fulfillment date:
                        - END_OF_MONTH: (days to end of month) + duration_days
                        - END_OF_WEEK: (days to end of week, Sunday) + duration_days
                        Note: Cannot be used with billing_account_id. Only specific duration_days values are allowed per scheme (typically 30, 45, 60).
                    examples:
                    - END_OF_MONTH
            required:
            - duration_days
            title: OrderNetTerms
            type: object
        OrderOriginationEnum:
            enum:
            - ONLINE
            - IN_STORE
            title: OrderOriginationEnum
            type: string
        ProductDetailsSchema:
            properties:
                brand:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: The brand name of the item. E.g. "Heinz".
                    title: Brand
                categories:
                    description: Array of one or more product categories. E.g. ["Studio
                        monitors", "Music equipment"]
                    items:
                        type: string
                    title: Categories
                    type: array
                barcodes:
                    anyOf:
                    -   items:
                            $ref: '#/components/schemas/BarCodeSchema'
                        type: array
                    -   type: 'null'
                    default: null
                    description: Array with Barcode objects for storing SKU, EAN,
                        etc.
                    title: Barcodes
                part_number:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: The manufacturer's part number
                    title: Part Number
            required:
            - categories
            title: ProductDetailsSchema
            type: object
        SuperLaxRepBuyerSchema:
            description: |-
                Intended for use in create order intent request where the buyer might
                send order intent with invalid representative data but it is okay for us to
                ignore that entry and process the intent anyway.
            properties:
                representative:
                    anyOf:
                    -   additionalProperties: true
                        type: object
                    -   type: 'null'
                    default: null
                    description: Fields to capture who the order is for
                    title: Representative
                company:
                    $ref: '#/components/schemas/CompanySchema'
                    description: Fields to capture the details of the company for
                        which the order is intended
            required:
            - company
            title: SuperLaxRepBuyerSchema
            type: object
        TermsPeriod:
            enum:
            - MONTHLY
            title: TermsPeriod
            type: string
        OrderIntentResponseSchema:
            examples:
            -   approved: true
                buyer:
                    company:
                        company_name: TWO B2B LTD
                        company_type: ''
                        country_prefix: GB
                        organization_number: '13078389'
                        website: null
                    representative:
                        email: john.doe@twob2bltd.com
                        first_name: John
                        last_name: Doe
                        phone_number: '+447516498321'
                currency: GBP
                decline_reason: null
                gross_amount: '120.00'
                id: 5af5a991-8822-4b61-b892-2ffdd2931fba
                invoice_type: FUNDED_INVOICE
                line_items:
                -   description: Blue whale poster
                    details:
                        barcodes:
                        -   type: SKU
                            value: 5954d9e0-ebfb-4498-86a9-3141e8942dc8
                        -   type: UPC
                            value: cece4007-028c-469c-b0d2-2c038b583b69
                        brand: Whale Posters INC
                        categories:
                        - Home
                        - Art
                        part_number: n/a
                    discount_amount: '0.00'
                    gross_amount: '120.00'
                    id: c5f65af4-3fdc-4c46-aa4e-8378b4ba0558
                    image_url: https://www.exampleobjects.com/product-image-800x600
                    line_item_reference: null
                    name: Whale poster
                    net_amount: '100.00'
                    product_page_url: https://www.example.com/products/7e34f2a8d
                    prototype_id: null
                    quantity: 1.0
                    quantity_unit: pcs
                    tax_amount: '20.00'
                    tax_class_name: VAT 20%
                    tax_rate: '0.200000'
                    type: PHYSICAL
                    unit_price: '100.00'
                merchant_id: 32d8eb3f-8ac3-4aca-82b9-dbbd6f416cfb
                merchant_short_name: tillittestuk
                order_origination: ONLINE
                tracking_id: 3987eb99-f726-436a-aed1-1c77a1ceb667
            properties:
                id:
                    anyOf:
                    -   format: uuid
                        type: string
                    -   type: 'null'
                    default: null
                    description: A globally unique ID set by Two.
                    title: Id
                gross_amount:
                    description: net_amount + tax_amount
                    examples:
                    - '100.00'
                    format: decimal
                    pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                    title: Gross Amount
                    type: string
                net_amount:
                    anyOf:
                    -   format: decimal
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: gross_amount - tax_amount
                    examples:
                    - 100.00 - 20% = 80.00
                    title: Net Amount
                tax_amount:
                    anyOf:
                    -   format: decimal
                        pattern: ^-?[0-9]+(\.[0-9]{0,2})?
                        type: string
                    -   type: 'null'
                    default: null
                    description: net_amount * tax_rate
                    examples:
                    - '20.00'
                    title: Tax Amount
                invoice_type:
                    anyOf:
                    -   $ref: '#/components/schemas/InvoiceTypeEnum'
                    -   type: 'null'
                    default: null
                    description: 'FUNDED_INVOICE: Two will handle the invoice and
                        transfer the funds to the merchant as per the factoring agreement.
                        The invoice_details field will be populated by Two. DIRECT_INVOICE:
                        Two generates and sends the invoice to the customer based
                        on the bank account provided by the merchant, but the merchant
                        takes the full credit and fraud risk on direct invoices and
                        they will not receive a payout.'
                    examples:
                    - FUNDED_INVOICE
                currency:
                    description: Currency code in ISO 4217 format. E.g. 'NOK'
                    examples:
                    - GBP
                    title: Currency
                    type: string
                line_items:
                    description: List of the line items that constitute the order
                    items:
                        $ref: '#/components/schemas/LineItemResponseSchema'
                    title: Line Items
                    type: array
                buyer:
                    $ref: '#/components/schemas/BuyerSchema'
                    description: Fields representing the buyer
                approved:
                    anyOf:
                    -   type: boolean
                    -   type: 'null'
                    default: null
                    description: Credit decision for the order intent
                    title: Approved
                decline_reason:
                    anyOf:
                    -   $ref: '#/components/schemas/DeclineReasonEnum'
                    -   type: 'null'
                    default: null
                    description: Reason for order being declined
                recourse_decision_reason:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Reason for recourse decision
                    title: Recourse Decision Reason
                merchant_id:
                    anyOf:
                    -   format: uuid
                        type: string
                    -   type: 'null'
                    default: null
                    description: A globally unique merchant ID set by Two.
                    title: Merchant Id
                merchant_short_name:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Merchant's short name
                    title: Merchant Short Name
                shipping_address:
                    anyOf:
                    -   $ref: '#/components/schemas/AddressResponseSchema'
                    -   type: 'null'
                    default: null
                    description: Order shipping address
                tracking_id:
                    anyOf:
                    -   type: string
                    -   type: 'null'
                    default: null
                    description: Optional order intent tracking id
                    title: Tracking Id
                order_origination:
                    anyOf:
                    -   $ref: '#/components/schemas/OrderOriginationEnum'
                    -   type: 'null'
                    default: null
                    description: IN_STORE orders are not enabled by default. Please
                        reach out to us if you would like to discuss IN_STORE orders.
                    examples:
                    - ONLINE
                approved_on_recourse:
                    description: If the intent is approved, indicates whether it is
                        approved on recourse
                    title: Approved On Recourse
                    type: boolean
                approved_with_conditions:
                    description: Order approved pending conditions that the user must
                        satisfy during the verification journey
                    examples:
                    -   description: During verification the buyer will be asked to
                            share business bank account data using open banking
                        value: OPEN_BANKING_DATA
                    -   description: During verification the buyer will be asked to
                            consent to credit check, consent will trigger a credit
                            check
                        value: CREDIT_CHECK_CONSENT
                    items:
                        $ref: '#/components/schemas/ApprovalConditionEnum'
                    title: Approved With Conditions
                    type: array
                terms:
                    anyOf:
                    -   description: For backwards compatibility, `type` can be omitted
                            for instalment terms, if the fields period and number_of_instalments
                            are populated. It is recommended that that clients always
                            provide a type value.
                        discriminator:
                            mapping:
                                INSTALMENTS: '#/components/schemas/OrderInstalmentTerms'
                                NET_TERMS: '#/components/schemas/OrderNetTerms'
                            propertyName: type
                        oneOf:
                        -   $ref: '#/components/schemas/OrderInstalmentTerms'
                        -   $ref: '#/components/schemas/OrderNetTerms'
                    -   type: 'null'
                    default: null
                    description: The terms of this order
                    title: Terms
            required:
            - gross_amount
            - currency
            - line_items
            - buyer
            - approved_on_recourse
            - approved_with_conditions
            title: OrderIntentResponseSchema
            type: object
