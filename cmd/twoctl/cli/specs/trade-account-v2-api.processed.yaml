components:
  schemas:
    ErrorResponse:
      properties:
        error_code:
          default: null
          description: An error code related to the error.
          title: Error Code
          type: string
          nullable: true
        error_details:
          default: null
          description: A detailed description of the error when available.
          title: Error Details
          type: string
          nullable: true
        error_message:
          default: null
          description: A short description of the error.
          title: Error Message
          type: string
          nullable: true
        error_json:
          default: null
          description: A list of errors when available.
          title: Error Json
          items:
            $ref: '#/components/schemas/ErrorJSON'
          type: array
          nullable: true
        error_trace_id:
          default: null
          description: A unique trace ID for the request that generated the error. Please quote this trace ID in any support requests.
          title: Error Trace Id
          type: string
          nullable: true
      title: ErrorResponse
      type: object
    ErrorJSON:
      properties:
        loc:
          default: null
          description: Error location.
          title: Loc
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          nullable: true
        msg:
          default: null
          description: Error message.
          title: Msg
          type: string
          nullable: true
        type:
          default: null
          description: Error type.
          title: Type
          type: string
          nullable: true
        ctx:
          anyOf:
            - type: string
            - additionalProperties: true
              type: object
          default: null
          description: Error context information.
          title: Ctx
          nullable: true
      title: ErrorJSON
      type: object
    CustomerCreateRequestSchemaV2:
      description: Web schema for merchant customer create
      example:
        billing_email_address: example@gmail.com
        country_prefix: GB
        legal_name: TWO B2B LTD
        merchant_customer_id: merchant-cid-123
        merchant_redirect_urls:
          onboarding_completed_url: https://www.success.com/
          onboarding_failed_url: https://www.afternic.com/forsale/failed.com?utm_source=TDFS&utm_medium=sn_affiliate_click&utm_campaign=TDFS_Affiliate_namefind_direct9&traffic_type=CL3&traffic_id=Namefind
        official_address:
          city: London
          country: GB
          id: '12345'
          organization_name: TWO B2B LTD
          postal_code: EC2A 4BT
          region: GB
          street_address: 4 Crown Pl
        organization_id: '13078389'
        shipping_address:
          city: London
          country: GB
          id: '12345'
          organization_name: TWO B2B LTD
          postal_code: EC2A 4BT
          region: GB
          street_address: 4 Crown Pl
        website: example.com
      properties:
        billing_email_address:
          default: null
          deprecated: true
          description: Deprecated, please use invoice_email_addresses.
          title: Billing Email Address
          format: email
          type: string
          nullable: true
        invoice_email_addresses:
          default: null
          description: These email addresses is designated to receive the invoices attached to this trade account in addition to the user email used to create orders. In case the order is placed using a billing account ID, emails will be directed to the address specified for that billing account instead.
          title: Invoice Email Addresses
          items:
            format: email
            type: string
          type: array
          nullable: true
        email_domain:
          default: null
          deprecated: true
          description: Unique name that appears after the @ sign in email addresses
          title: Email Domain
          type: string
          nullable: true
        legal_name:
          default: null
          deprecated: true
          description: The legal name of the buyer company, deprecated as Two company search will set the customer legal name
          title: Legal Name
          type: string
          nullable: true
        merchant_customer_id:
          description: The customer id registered in the merchant's solution
          maxLength: 255
          minLength: 1
          title: Merchant Customer Id
          type: string
        merchant_redirect_urls:
          default: null
          deprecated: true
          $ref: '#/components/schemas/MerchantRedirectUrlsSchema'
          nullable: true
        official_address:
          $ref: '#/components/schemas/CreateAddressRequestSchema'
          description: Address fields connected to the business customer
        website:
          default: null
          description: The website of the business customer
          title: Website
          type: string
          nullable: true
        insights_webhook:
          default: null
          deprecated: true
          description: Deprecated
          title: Insights Webhook
          type: string
          nullable: true
        shipping_addresses:
          default: null
          description: Address fields connected to the business customer
          title: Shipping Addresses
          items:
            $ref: '#/components/schemas/CreateAddressRequestSchema'
          type: array
          nullable: true
        trade_name:
          default: null
          description: If the company is using a different brand/trade name, this can included here.
          title: Trade Name
          type: string
          nullable: true
        webhooks:
          default: null
          $ref: '#/components/schemas/HookSchema'
          nullable: true
        additional_identifiers:
          default: null
          description: Optionally provide us with any other relevant identifiers related to this company.
          title: Additional Identifiers
          additionalProperties:
            type: string
          propertyNames:
            $ref: '#/components/schemas/AdditionalIdentifierSchemaEnum'
          type: object
          nullable: true
        estimated_monthly_spend:
          default: null
          description: The estimated monthly spend for the customer.
          title: Estimated Monthly Spend
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          type: string
          nullable: true
        canonical_id:
          default: null
          description: Canonical company identifier. If provided, country_prefix and organization_id are optional.
          title: Canonical Id
          type: string
          nullable: true
        country_prefix:
          default: null
          description: Country code in ISO 3166-1 alpha-2 format. Required if canonical_id is not provided.
          examples:
            - GB
          $ref: '#/components/schemas/CountryCodeEnum'
          nullable: true
        organization_id:
          default: null
          description: Organization number of the buyer company. Required if canonical_id is not provided.
          title: Organization Id
          maxLength: 255
          minLength: 1
          type: string
          nullable: true
      required:
        - merchant_customer_id
        - official_address
      title: CustomerCreateRequestSchemaV2
      type: object
