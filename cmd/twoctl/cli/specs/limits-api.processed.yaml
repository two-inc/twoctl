openapi: 3.0.3
info:
  title: Two Limits API
  version: '1.0'
  description: |-
    ## Overview and usage

    This API allows you to retrieve the credit limit of your buyers.

    To be specific, you can lookup credit limit for your buyers using organization
    number or canonical ID which you can obtain via our [Company
    API](/docs/api/company).

    This API is not enabled by default. To request access, please contact us at integration@two.inc for more information.


    ## Environments

    ### Testing

    [https://api.sandbox.two.inc](https://api.sandbox.two.inc/v1/health)

    Note: Read about our [sandbox environment specific behaviour](/docs/guides/sandbox-behaviour-page/).

    ### Production

    [https://api.two.inc](https://api.two.inc/v1/health)
tags:
  - name: Limits
paths:
  /limits/v1/company/{buyer_country_code}/{buyer_organization_number}:
    get:
      summary: Retrieve company credit limit
      operationId: get_buyer_credit_limits.get
      description: Retrieve buyer company credit limit based on buyer country code and organization number.
      tags:
        - Limits
      parameters:
        - name: buyer_country_code
          in: path
          required: true
          schema:
            type: string
          description: Buyer country code
        - name: buyer_organization_number
          in: path
          required: true
          schema:
            type: string
          description: Buyer organization number
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Credit limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniversalCreditLimitsResponse'
        '403':
          description: Access denied
        '404':
          description: Buyer company not found
      security:
        - X-Api-Key: []
  /limits/v1/company/{buyer_company_canonical_id}:
    get:
      summary: Retrieve company credit limit by canonical ID
      operationId: get_buyer_credit_limits_by_canonical_id.get
      description: Retrieve buyer company credit limit based on company canonical ID. This is a unique ID that represents a company on our system and can be obtained using our [Company API](/docs/api/company).
      tags:
        - Limits
      parameters:
        - name: buyer_company_canonical_id
          in: path
          required: true
          schema:
            type: string
          description: Buyer company canonical ID
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Credit limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniversalCreditLimitsResponse'
        '403':
          description: Access denied
        '404':
          description: Buyer company not found
      security:
        - X-Api-Key: []
  /limits/v1/credit-builder/url:
    post:
      summary: Create a credit builder url for a buyer company.
      operationId: create_credit_builder_url_handler.post
      description: Create buyer company credit builder url based on company canonical ID, and supply a return url for user to return to upon completion of credit builder. Canonical ID a unique ID that represents a company on our system and can be obtained using our [Company API](/docs/api/company)
      tags:
        - Limits
      parameters: []
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Credit builder url response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBuilderUrlResponseSchema'
        '403':
          description: Access denied
        '404':
          description: Buyer company not found
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditBuilderUrlCreateSchema'
components:
  schemas:
    ErrorResponse:
      properties:
        error_code:
          default: null
          description: An error code related to the error.
          title: Error Code
          type: string
          nullable: true
        error_details:
          default: null
          description: A detailed description of the error when available.
          title: Error Details
          type: string
          nullable: true
        error_message:
          default: null
          description: A short description of the error.
          title: Error Message
          type: string
          nullable: true
        error_json:
          default: null
          description: A list of errors when available.
          title: Error Json
          items:
            $ref: '#/components/schemas/ErrorJSON'
          type: array
          nullable: true
        error_trace_id:
          default: null
          description: A unique trace ID for the request that generated the error. Please quote this trace ID in any support requests.
          title: Error Trace Id
          type: string
          nullable: true
      title: ErrorResponse
      type: object
    ErrorJSON:
      properties:
        loc:
          default: null
          description: Error location.
          title: Loc
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          nullable: true
        msg:
          default: null
          description: Error message.
          title: Msg
          type: string
          nullable: true
        type:
          default: null
          description: Error type.
          title: Type
          type: string
          nullable: true
        ctx:
          anyOf:
            - type: string
            - additionalProperties: true
              type: object
          default: null
          description: Error context information.
          title: Ctx
          nullable: true
      title: ErrorJSON
      type: object
    UniversalCreditLimitsResponse:
      properties:
        decision:
          $ref: '#/components/schemas/UniversalCreditDecisionSchema'
        credit:
          $ref: '#/components/schemas/UniversalCreditSchema'
        recourse:
          default: null
          $ref: '#/components/schemas/UniversalRecourseSchema'
          nullable: true
        buyer_company_name:
          title: Buyer Company Name
          type: string
        company_number:
          title: Company Number
          type: string
        country_code:
          $ref: '#/components/schemas/CountryCodeEnum'
        currency:
          $ref: '#/components/schemas/CurrencyEnum'
        risk_bucket:
          default: null
          $ref: '#/components/schemas/RiskBucketEnum'
          nullable: true
      required:
        - decision
        - credit
        - buyer_company_name
        - company_number
        - country_code
        - currency
      title: UniversalCreditLimitsResponse
      type: object
    BuyerCreditLimitSchema:
      properties:
        merchant_defined_limit:
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          title: Merchant Defined Limit
          type: string
        exposure:
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          title: Exposure
          type: string
        available_limit:
          title: Available Limit
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          type: string
          nullable: true
      required:
        - merchant_defined_limit
        - exposure
        - available_limit
      title: BuyerCreditLimitSchema
      type: object
