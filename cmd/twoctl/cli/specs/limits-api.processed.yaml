      title: UniversalCreditDecisionSchema
      type: object
    UniversalCreditLimitSchema:
      properties:
        total_limit:
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          title: Total Limit
          type: string
        exposure:
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          title: Exposure
          type: string
        available_limit:
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          title: Available Limit
          type: string
        per_order_limit:
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          title: Per Order Limit
          type: string
      required:
        - total_limit
        - exposure
        - available_limit
        - per_order_limit
      title: UniversalCreditLimitSchema
      type: object
    UniversalCreditSchema:
      properties:
        currency:
          $ref: '#/components/schemas/CurrencyEnum'
        short_term:
          $ref: '#/components/schemas/UniversalCreditLimitSchema'
        long_term:
          $ref: '#/components/schemas/UniversalCreditLimitSchema'
      required:
        - currency
        - short_term
        - long_term
      title: UniversalCreditSchema
      type: object
    UniversalRecourseSchema:
      properties:
        buyer:
          $ref: '#/components/schemas/BuyerCreditLimitSchema'
        merchant:
          $ref: '#/components/schemas/MerchantCreditLimitSchema'
        currency:
          $ref: '#/components/schemas/CurrencyEnum'
        is_recourse_enabled:
          title: Is Recourse Enabled
          type: boolean
        recourse_decline_reason:
          default: null
          title: Recourse Decline Reason
          type: string
          nullable: true
        recourse_flag:
          title: Recourse Flag
          type: boolean
      required:
        - buyer
        - merchant
        - currency
        - is_recourse_enabled
        - recourse_flag
      title: UniversalRecourseSchema
      type: object
    CreditBuilderUrlCreateSchema:
      properties:
        canonical_id:
          description: Unique canonical ID representing the company the credit builder url is for
          title: Canonical Id
          type: string
        return_url:
          description: 'Url the user will be advised to return to after the credit builder process is completed. This URL will have query parameters appended to it of the `status` and `result` of the credit builder process.status can be the following: COMPLETED, ERROR, ABANDONEDif status is COMPLETED, result will be appended, and can be the following: INCREASED,DECREASED,NO_CHANGE,NO_CREDIT,UNDER_REVIEW'
          title: Return Url
          type: string
        company_representative_email:
          default: null
          description: Email of the company representative, this allows us to contact the user on the outcome of their credit builder application if the data needs to be manually reviewed. This is optional and can be None.
          title: Company Representative Email
          format: email
          type: string
          nullable: true
      required:
        - canonical_id
        - return_url
      title: CreditBuilderUrlCreateSchema
      type: object
    CreditBuilderUrlResponseSchema:
      properties:
        redirect_url:
          description: The URL to redirect the user to for credit builder. This URL will be valid for a limited time.
          title: Redirect Url
          type: string
        expires_at:
          description: The time at which the URL expires. After this time, the URL will no longer be valid.
          format: date-time
          title: Expires At
          type: string
      required:
        - redirect_url
        - expires_at
      title: CreditBuilderUrlResponseSchema
      type: object
  securitySchemes:
    X-Api-Key:
      type: apiKey
      description: |-
        For instructions on how to obtain API keys, visit [this page](/docs/guides/getting-api-keys-page/).
        You will obtain two different keys, an initial one for testing in our sandbox environment and once ready, for production.
        Your API keys enables others to act on your behalf if they are able to obtain them, so make sure to keep them safe.
        Your API key is not to be shared with anyone, including in your version control system, client-side code, in public chatrooms and so on.
        The API key is applied in the request header. For example:
        ```
        GET /something
        X-Api-Key: secret_test_aabbccddeeff0123456789
        ```

        API Keys have the following structure: `secret_<env>_<key>` where:
        - `env` is determined by the environment (`prod` for production, `test` for test environments)
        - `key` is a random, URL-safe, 64-bit encoded text string containing 32 random bytes.
      name: X-Api-Key
      in: header
servers:
