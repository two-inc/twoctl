    TradeAccountAddressSchema:
      properties:
        city:
          description: City name
          examples:
            - Berlin
          minLength: 1
          title: City
          type: string
        country:
          $ref: '#/components/schemas/CountryCodeEnum'
          description: Country code (ISO 3166-1 alpha-2)
          examples:
            - DE
        postal_code:
          default: ''
          description: Postal code or zip code, optional for countries where postal codes are not used or partially used
          examples:
            - '10115'
