openapi: 3.0.3
info:
  title: Trade Account API V3 (preview)
  version: '3.0'
  description: |-
    **This API is currently in preview.**
    This API allows you to onboard your business customers to your own product and to the Two "Buy Now Pay Later" product.

    Specifically:

    - Enable 1-click checkout with Two
    - Approve additional users to place orders on behalf of your business customers
    - Access insights and enriched data on your business customers

    ## Authentication & IDs

    Trade Account API v3 supports flexible identification of resources, allowing you to use either your own internal identifiers or our system-generated identifiers in path segments.

    #### How it works:
    When you provide an ID in a path parameter (e.g., <cid> in /customer/<cid>), our system attempts to resolve it:

    If the ID begins with two_: We interpret this as an identifier generated by our system. You would typically use this when referencing resources that you've previously created or retrieved from our API.

    Example: GET /trade-account/v3/customer/two_XYZ789
    If the ID does NOT begin with two_: We interpret this as your own internal identifier for the resource. This allows you to integrate seamlessly with your existing data structures.

    Example: GET /trade-account/v3/customer/yourInternalID123

    #### Collision Avoidance:
    To ensure unambiguous resolution, it is CRITICAL that any customer or entity identifiers you use and pass directly to our API (i.e., those without the two_ prefix) DO NOT begin with the string two_. This prefix is strictly reserved for identifiers originating from our platform. Please ensure your internal ID generation logic adheres to this constraint.

    ## Getting Started

    ### Step 1: Create a B2B trade account customer
    - Create a new trade account customer using the `POST /trade-account/v3/customer` endpoint.

    ### Step 2: Create users for your trade account customers.

    - The employees who place orders on behalf of your trade account customer (their employer), can be set up for purchasing through `POST /trade-account/v3/customer/<cid>/user`.

    - Upon successfully creating a user for a customer, onboarding is completed. To verify the user generate the verification link using `POST /trade-account/v3/user/<uid>/verification/url`. Verification of the customer user will allow one-click purchases for the customer user.

    Note: Two reserves the right to add extra verification steps for certain orders.


    ## Environments

    ### Testing

    [https://api.sandbox.two.inc](https://api.sandbox.two.inc/v1/health)

    Note: Read about our [sandbox environment specific behaviour](/docs/guides/sandbox-behaviour-page/).

    ### Production

    [https://api.two.inc](https://api.two.inc/v1/health)
tags:
  - name: Customer
  - name: Customer User
  - name: User
  - name: Customer Payment Method
paths:
  /trade-account/v3/customer:
    post:
      summary: Create customer
      operationId: create_trade_account_customer_handler.post
      description: Onboard a business customer by providing their company details. Returns a customer record with credit assessment and a unique identifier.
      tags:
        - Customer
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            default: null
            title: Idempotency-Key
            maxLength: 100
            type: string
            nullable: true
          required: false
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeAccountCustomerResponseSchema'
        '400':
          description: Customer company not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Customer already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeAccountCustomerCreateSchema'
  /trade-account/v3/customer/{cid}:
    put:
      summary: Replace customer
      operationId: replace_trade_account_customer_handler.put
      description: Overwrite all mutable fields on the customer record. Fields not included in the request body will be reset to their defaults.
      tags:
        - Customer
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: Customer ID, if it starts with two_ it is a system generated ID otherwise it is a custom ID
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeAccountCustomerResponseSchema'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeAccountCustomerReplaceSchema'
    get:
      summary: Get customer
      operationId: get_trade_account_customer_handler.get
      description: Retrieve the customer record including credit status and company details.
      tags:
        - Customer
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: Customer ID, if it starts with two_ it is a system generated ID otherwise it is a custom ID
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeAccountCustomerResponseSchema'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
  /trade-account/v3/customer/{cid}/user:
    post:
      summary: Create customer user
      operationId: create_trade_account_customer_user_handler.post
      description: Add an employee who can place orders on behalf of the business customer. Returns a user record with a verification URL.
      tags:
        - Customer User
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: Customer ID
        - name: Idempotency-Key
          in: header
          schema:
            default: null
            title: Idempotency-Key
            maxLength: 100
            type: string
            nullable: true
          required: false
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeAccountUserResponseSchema'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeAccountUserCreateSchema'
    get:
      summary: List customer users
      operationId: get_trade_account_customer_users_handler.get
      description: Fetch all users attached to the business customer account, including their verification status
      tags:
        - Customer User
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: Customer ID
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootModel[list[TradeAccountUserResponseSchema]]'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
  /trade-account/v3/user/{uid}/verification/url:
    post:
      summary: Create user verification URL
      operationId: create_trade_account_user_verication_url.post
      description: Generate a redirect URL that the user can visit to verify their identity. Once verified, the user can place orders with one-click checkout.
      tags:
        - User
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: User ID
        - name: Idempotency-Key
          in: header
          schema:
            default: null
            title: Idempotency-Key
            maxLength: 100
            type: string
            nullable: true
          required: false
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeAccountUserVerificationUrlResponsechema'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeAccountUserVerificationUrlCreateSchema'
  /trade-account/v3/user/{uid}:
    patch:
      summary: Update user
      operationId: update_trade_account_user_handler.patch
      description: Update contact details (email, phone number) for an existing user.
      tags:
        - User
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: User ID
        - name: Idempotency-Key
          in: header
          schema:
            default: null
            title: Idempotency-Key
            maxLength: 100
            type: string
            nullable: true
          required: false
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeAccountUserResponseSchema'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeAccountUserUpdateSchema'
    delete:
      summary: Delete user
      operationId: delete_trade_account_user_handler.delete
      description: Remove a user from the trade account customer. The user will no longer be able to place orders on behalf of the customer.
      tags:
        - User
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: User ID
        - name: Idempotency-Key
          in: header
          schema:
            default: null
            title: Idempotency-Key
            maxLength: 100
            type: string
            nullable: true
          required: false
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: No Content
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
    get:
      summary: Get user
      operationId: get_trade_account_user_handler.get
      description: Retrieve details of a user including their verification status.
      tags:
        - User
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeAccountUserResponseSchema'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
  /trade-account/v3/customer/{cid}/payment-method:
    get:
      summary: List customer payment methods
      operationId: list_payment_methods.get
      description: Retrieve all payment methods configured for the customer, including which one is set as default
      tags:
        - Customer Payment Method
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeAccountCustomerPaymentMethodResponseSchema'
        '400':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
    post:
      summary: Create customer payment method
      operationId: create_payment_method.post
      description: Add a payment method (e.g. bank account) that can be used for order payments
      tags:
        - Customer Payment Method
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: ''
        - name: Idempotency-Key
          in: header
          schema:
            default: null
            title: Idempotency-Key
            maxLength: 100
            type: string
            nullable: true
          required: false
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerPaymentMethodResponse'
        '400':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantCustomerPaymentMethodCreateRequest'
  /trade-account/v3/customer/{cid}/payment-method/{payment_method_id}:
    get:
      summary: Get customer payment method
      operationId: get_payment_method.get
      description: ''
      tags:
        - Customer Payment Method
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: ''
        - name: payment_method_id
          in: path
          required: true
          schema:
            type: string
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerPaymentMethodResponse'
        '400':
          description: Customer or payment method not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
    delete:
      summary: Delete customer payment method
      operationId: delete_payment_method.delete
      description: Remove a payment method from the customer. If the deleted method was the default, no default will be set automatically.
      tags:
        - Customer Payment Method
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: ''
        - name: payment_method_id
          in: path
          required: true
          schema:
            type: string
          description: ''
        - name: Idempotency-Key
          in: header
          schema:
            default: null
            title: Idempotency-Key
            maxLength: 100
            type: string
            nullable: true
          required: false
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Success, no content
        '400':
          description: Customer or payment method not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
  /trade-account/v3/customer/{cid}/payment-method/{payment_method_id}/make-default:
    post:
      summary: Set default payment method
      operationId: set_default_payment_method.post
      description: Mark this payment method as the default for the customer. The previous default (if any) will be unset.
      tags:
        - Customer Payment Method
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: ''
        - name: payment_method_id
          in: path
          required: true
          schema:
            type: string
          description: ''
        - name: Idempotency-Key
          in: header
          schema:
            default: null
            title: Idempotency-Key
            maxLength: 100
            type: string
            nullable: true
          required: false
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Success, no content
        '400':
          description: Customer or payment method not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
components:
  schemas:
    ErrorResponse:
      properties:
        error_code:
          default: null
          description: An error code related to the error.
          title: Error Code
          type: string
          nullable: true
        error_details:
          default: null
          description: A detailed description of the error when available.
          title: Error Details
          type: string
          nullable: true
        error_message:
          default: null
          description: A short description of the error.
          title: Error Message
          type: string
          nullable: true
        error_json:
          default: null
          description: A list of errors when available.
          title: Error Json
          items:
            $ref: '#/components/schemas/ErrorJSON'
          type: array
          nullable: true
        error_trace_id:
          default: null
          description: A unique trace ID for the request that generated the error. Please quote this trace ID in any support requests.
          title: Error Trace Id
          type: string
          nullable: true
      title: ErrorResponse
      type: object
    ErrorJSON:
      properties:
        loc:
          default: null
          description: Error location.
          title: Loc
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          nullable: true
        msg:
          default: null
          description: Error message.
          title: Msg
          type: string
          nullable: true
        type:
          default: null
          description: Error type.
          title: Type
          type: string
          nullable: true
        ctx:
          anyOf:
            - type: string
            - additionalProperties: true
              type: object
          default: null
          description: Error context information.
          title: Ctx
          nullable: true
      title: ErrorJSON
      type: object
    TradeAccountCustomerCreateSchema:
      properties:
        canonical_id:
          default: null
          description: Canonical id of the company can be found by using company search in Two Company API, strongly recommended this value is used to create the customer.
          title: Canonical Id
          type: string
          nullable: true
        country_code:
          default: null
          description: The country code of the customer company. If canonical id not supplied, customer company is looked up using this field and organization_number.
          $ref: '#/components/schemas/CountryCodeEnum'
          nullable: true
        organization_number:
          default: null
          description: The organization number of the customer company.If canonical id not supplied, customer company is looked up using this field and country_code.
          title: Organization Number
          type: string
          nullable: true
        merchant_customer_id:
          description: The customer id registered in the merchant's solution
          maxLength: 255
          minLength: 1
          title: Merchant Customer Id
          type: string
        contact_persons:
          description: List of contact persons for the customer. At least one contact person is required.
          items:
            $ref: '#/components/schemas/ContactCreateSchema'
          minItems: 1
          title: Contact Persons
          type: array
        invoice_email_addresses:
          default: null
          description: List of email addresses to send invoices and payment reminders to, these will be included in addition to the email address of the trade account user associated with the invoice.
          title: Invoice Email Addresses
          items:
            format: email
            type: string
          type: array
          nullable: true
        invoice_billing_address:
          default: null
          description: The billing address to be used for invoices, unless explicity set when creating the order. If not provided, the billing address must be provided on order create.
          $ref: '#/components/schemas/TradeAccountAddressSchema'
          nullable: true
        use_billing_address_for_shipping:
          default: false
          description: If true, the billing address will be used as the shipping address for invoices, unless shipping address is explicitly set when creating the order.
          title: Use Billing Address For Shipping
          type: boolean
        trade_name:
          default: null
          description: If the customer is using a different brand/trade name, this value will set trade_name on the orders associated with the customer.
          title: Trade Name
          type: string
          nullable: true
      required:
        - merchant_customer_id
        - contact_persons
      title: TradeAccountCustomerCreateSchema
      type: object
    ContactCreateSchema:
      properties:
        first_name:
          description: Contact first name
          examples:
            - John
          title: First Name
          type: string
        last_name:
          description: Contact last name
          examples:
            - Doe
          title: Last Name
          type: string
        phone_number:
          description: 'Contact phone number. '
          examples:
            - +44XXXXXXXXXX
          title: Phone Number
          type: string
        email:
          description: Contact email address
          examples:
            - johndoe0112358@gmail.com
          format: email
          title: Email
          type: string
      required:
        - first_name
        - last_name
        - phone_number
        - email
      title: ContactCreateSchema
      type: object
