components:
  schemas:
    ErrorResponse:
      properties:
        error_code:
          default: null
          description: An error code related to the error.
          title: Error Code
          type: string
          nullable: true
        error_details:
          default: null
          description: A detailed description of the error when available.
          title: Error Details
          type: string
          nullable: true
        error_message:
          default: null
          description: A short description of the error.
          title: Error Message
          type: string
          nullable: true
        error_json:
          default: null
          description: A list of errors when available.
          title: Error Json
          items:
            $ref: '#/components/schemas/ErrorJSON'
          type: array
          nullable: true
        error_trace_id:
          default: null
          description: A unique trace ID for the request that generated the error. Please quote this trace ID in any support requests.
          title: Error Trace Id
          type: string
          nullable: true
      title: ErrorResponse
      type: object
    ErrorJSON:
      properties:
        loc:
          default: null
          description: Error location.
          title: Loc
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          nullable: true
        msg:
          default: null
          description: Error message.
          title: Msg
          type: string
          nullable: true
        type:
          default: null
          description: Error type.
          title: Type
          type: string
          nullable: true
        ctx:
          anyOf:
            - type: string
            - additionalProperties: true
              type: object
          default: null
          description: Error context information.
          title: Ctx
          nullable: true
      title: ErrorJSON
      type: object
    CreatePartnerMerchantRequestSchema:
      examples:
        - address_city: London
          address_country_code: GB
          address_lines: Test Square
          address_postal_code: AED 12A
          country_code: GB
          email: test@two.inc
          email_erp: erp@two.inc
          email_invoice: invoice@two.inc
          fixed_fee_per_order: '0.0'
          legal_name: Two B2B LIMITED
          logo_path: https://test.com/test.png
          national_id: '13078389'
          payment_provider_details:
            bank_account:
              branch_sort_code: 04-00-11
              country_code: GB
              description: Bank Account Test
              local_account_number: '31126819'
          percentage_fee_per_order: '2.0'
          phone: '12345678'
          phone_invoice: '12345670'
          short_name: testshortname
          website: https://two.inc
        - address_city: OSLO
          address_country_code: 'NO'
          address_lines: Testplass 1
          address_postal_code: '1111'
          country_code: 'NO'
          email: test@two.inc
          email_erp: erp@two.inc
          email_invoice: invoice@two.inc
          fixed_fee_per_order: '0.0'
          legal_name: Two AS
          logo_path: https://test.com/test.png
          national_id: '925976105'
          payment_provider_details:
            bank_account:
              bban: '11111111111'
              bic: DNBANOKK
              country_code: 'NO'
              description: Bank Account Test
              iban: NO9311111111111
          percentage_fee_per_order: '2.0'
          phone: '12345678'
          phone_invoice: '12345670'
          short_name: testshortname
          website: https://two.inc
      properties:
        id:
          default: null
          description: Unique ID of the merchant
          title: Id
          format: uuid
          type: string
          nullable: true
        short_name:
          default: null
          deprecated: true
          description: Short name of the merchant
          title: Short Name
          type: string
          nullable: true
        logo_path:
          default: null
          description: 'The logo URL, valid extensions are: .png, .svg'
          title: Logo Path
          type: string
          nullable: true
        vat_number:
          default: null
          description: The VAT number of the merchant
          title: Vat Number
          type: string
          nullable: true
        vat_registered:
          default: null
          description: Whether the merchant is VAT registered
          title: Vat Registered
          type: boolean
          nullable: true
        country_code:
          default: null
          description: Country code of the merchant
          $ref: '#/components/schemas/CountryCodeEnum'
          nullable: true
        national_id:
          description: National ID of the merchant
          title: National Id
          type: string
        legal_name:
          description: Legal name of the merchant
          title: Legal Name
          type: string
        display_name:
          default: null
          description: The display name of the merchant
          title: Display Name
          type: string
          nullable: true
        website:
          default: null
          description: The website of the merchant
          title: Website
          type: string
          nullable: true
        email:
          description: The email of the merchant
          format: email
          title: Email
          type: string
        email_invoice:
          default: null
          description: The email for invoices of the merchant
          title: Email Invoice
          format: email
          type: string
          nullable: true
        email_erp:
          default: null
          description: The email for ERP of the merchant
          title: Email Erp
          format: email
          type: string
          nullable: true
        phone:
          default: null
          description: Phone number of the merchant
          title: Phone
          type: string
          nullable: true
        phone_invoice:
          default: null
          description: Phone number for invoices of the merchant
          title: Phone Invoice
          type: string
          nullable: true
        address_lines:
          default: null
          description: The address lines of the merchant
          title: Address Lines
          type: string
          nullable: true
        address_city:
          default: null
          description: City of the merchant
          title: Address City
          type: string
          nullable: true
        address_postal_code:
          default: null
          description: Postal code of the merchant
          title: Address Postal Code
          type: string
          nullable: true
        address_country_code:
          default: null
          description: Country code of the merchant
          $ref: '#/components/schemas/CountryCodeEnum'
          nullable: true
        fee_currency:
          default: null
          description: The currency of the fees
          $ref: '#/components/schemas/CurrencyEnum'
          nullable: true
        fixed_fee_per_order:
          default: null
          description: The fixed fee per order
          title: Fixed Fee Per Order
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,2})?
          type: string
          nullable: true
        percentage_fee_per_order:
          default: null
          description: The percentage fee per order
          title: Percentage Fee Per Order
          format: decimal
          pattern: ^-?[0-9]+(\.[0-9]{0,6})?
          type: string
          nullable: true
        due_in_days:
          default: null
          description: The due in days
          title: Due In Days
          type: integer
          nullable: true
        gov_due_in_days:
          default: null
          description: The government due in days
          title: Gov Due In Days
          type: integer
          nullable: true
        payment_provider_details:
          default: null
          description: The payment provider details of the merchant
          $ref: '#/components/schemas/PartnerPPDetailsSchema'
          nullable: true
        bank_statement_email:
          default: null
          deprecated: true
          description: The bank statement email of the merchant
          title: Bank Statement Email
          format: email
          type: string
          nullable: true
        bank_statement_email_addresses:
          default: null
          description: The bank statement email addresses of the merchant
          title: Bank Statement Email Addresses
          items:
            format: email
            type: string
          type: array
          nullable: true
        statement_email_cycle:
          default: null
          description: The statement email cycle of the merchant
          $ref: '#/components/schemas/PayoutPlanEnum'
          nullable: true
        partner:
          default: null
          description: The partner's short name
          title: Partner
          type: string
          nullable: true
        partner_id:
          default: null
          description: The partner's ID
          title: Partner Id
          format: uuid
          type: string
          nullable: true
      required:
        - national_id
        - legal_name
        - email
      title: CreatePartnerMerchantRequestSchema
      type: object
    BankAccountSchema:
      properties:
        id:
          default: null
          title: Id
          format: uuid
          type: string
          nullable: true
        bban:
          default: null
          title: Bban
          maxLength: 30
          minLength: 7
          pattern: ^[0-9A-Za-z]*$
          type: string
          nullable: true
        iban:
          default: null
          title: Iban
          maxLength: 34
          minLength: 15
          pattern: ^[0-9A-Za-z]*$
          type: string
          nullable: true
        bic:
          default: null
          title: Bic
          maxLength: 12
          minLength: 8
          pattern: ^[0-9A-Za-z]*$
          type: string
          nullable: true
        country_code:
          default: null
          $ref: '#/components/schemas/CountryCodeEnum'
          nullable: true
        branch_sort_code:
          default: null
          title: Branch Sort Code
          maxLength: 9
          pattern: ^[0-9]*$
          type: string
          nullable: true
        local_account_number:
          default: null
          title: Local Account Number
          maxLength: 12
          minLength: 8
          pattern: ^[0-9]*$
          type: string
          nullable: true
        organization_name:
          default: null
          title: Organization Name
          maxLength: 140
          minLength: 1
          type: string
          nullable: true
        organization_number:
          default: null
          title: Organization Number
          type: string
          nullable: true
        description:
          default: null
          title: Description
          maxLength: 255
          minLength: 1
          type: string
          nullable: true
        kid_type:
          default: null
          $ref: '#/components/schemas/KidTypeEnum'
          nullable: true
      title: BankAccountSchema
      type: object
    CountryCodeEnum:
      enum:
        - AD
        - AE
        - AL
        - AM
        - AO
        - AR
        - AT
        - AU
        - AZ
        - BA
        - BB
        - BD
        - BE
        - BF
        - BG
        - BH
        - BI
        - BJ
        - BN
        - BO
        - BR
        - BS
        - BW
        - CA
        - CG
        - CH
        - CL
        - CM
        - CO
        - CR
        - CY
