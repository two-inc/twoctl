openapi: 3.0.3
info:
  title: Two Marketplace API
  version: '1.0'
  description: |-
    This API is for creating new merchants as a part of a marketplace setup using Two.
    The merchants that are onboarded through the markeplace are able to sell products or services with Two as the payment solution.

    Note: Only authorised merchants will have access to use this API. Feel free to contact support@two.inc if you think this API might be relevant for your marketplace setup.

    Specifically:

    - Sign up merchants with Two through your own solution
    - Get information about the registered Two merchants
    - Update information of registered Two merchant
    - Use the Two Checkout API with API keys for each inidividual merchant when creating and handling orders

    ### Step 1: Create and onboard merchant with Two
    Do a `POST /partner/v1/merchant` with the required information to sign up a merchant with Two.

    Keep note of the merchant's `id` in the response (hereby referred to as `merchant_id`) in the response.
    You can then add `X-Merchant-Id: <merchant_id>` to requests that require `X-Api-Key` header and execute our endpoints on behalf of the merchant. For example:
    ```
    GET /something
    X-Api-Key: <your_api_key>
    X-Merchant-Id: <merchant_id>
    ```

    ### Step 2: Create order (Checkout API)
    Do a `POST /v1/order` from the Checkout API by using `secret_api_key` of the specific merchant as authentication.

    ### Other:
    - Get all your marketplace merchants `GET /partner/v1/merchant`
    - Get specific marketplace merchant `GET /partner/v1/merchant/<merchant_id>`
    - Update specific marketplace merchant `PATCH /partner/v1/merchant/<merchant_id>`

    Note: All Checkout API features are available for the merchant onboarded with Two.


    ## Environments

    ### Testing

    [https://api.sandbox.two.inc](https://api.sandbox.two.inc/v1/health)

    Note: Read about our [sandbox environment specific behaviour](/docs/guides/sandbox-behaviour-page/).

    ### Production

    [https://api.two.inc](https://api.two.inc/v1/health)
tags:
  - name: Marketplace V1
  - name: Marketplace V2
paths:
  /partner/v1/merchant:
    post:
      summary: Create marketplace merchant
      operationId: create_partner_merchant_handler_v1.post
      description: 'Create a new merchant who can sell products or services through Two. Note: The legacy endpoint `/v1/partner/{partner_id}/merchant` is deprecated but still supported for backward compatibility.'
      tags:
        - Marketplace V1
      parameters: []
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '201':
          description: Merchant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePartnerMerchantResponseSchema'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Merchant already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePartnerMerchantRequestSchema'
            examples:
              GB merchant:
                value:
                  short_name: testshortname
                  logo_path: https://test.com/test.png
                  national_id: '13078389'
                  legal_name: Two B2B LIMITED
                  email: test@two.inc
                  email_erp: erp@two.inc
                  email_invoice: invoice@two.inc
                  phone: '12345678'
                  phone_invoice: '12345670'
                  website: https://two.inc
                  address_lines: Test Square
                  address_city: London
                  address_postal_code: AED 12A
                  address_country_code: GB
                  fixed_fee_per_order: '0.0'
                  percentage_fee_per_order: '2.0'
                  country_code: GB
                  payment_provider_details:
                    bank_account:
                      description: Bank Account Test
                      branch_sort_code: 04-00-11
                      local_account_number: '31126819'
                      country_code: GB
              NO merchant:
                value:
                  short_name: testshortname
                  logo_path: https://test.com/test.png
                  national_id: '925976105'
                  legal_name: Two AS
                  email: test@two.inc
                  email_erp: erp@two.inc
                  email_invoice: invoice@two.inc
                  phone: '12345678'
                  phone_invoice: '12345670'
                  website: https://two.inc
                  address_lines: Testplass 1
                  address_city: OSLO
                  address_postal_code: '1111'
                  address_country_code: 'NO'
                  fixed_fee_per_order: '0.0'
                  percentage_fee_per_order: '2.0'
                  country_code: 'NO'
                  payment_provider_details:
                    bank_account:
                      description: Bank Account Test
                      bban: '11111111111'
                      iban: NO9311111111111
                      bic: DNBANOKK
                      country_code: 'NO'
    get:
      summary: Get all marketplace merchants
      operationId: get_partners_merchant_handler_v1.get
      description: 'Retrieve all merchants associated with your marketplace. Note: The legacy endpoint `/v1/partner/{partner_id}/merchant` is deprecated but still supported for backward compatibility.'
      tags:
        - Marketplace V1
      parameters: []
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Merchant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantResponseListSchema'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
  /partner/v1/merchant/{merchant_id}:
    get:
      summary: Get marketplace merchant
      operationId: get_partner_merchant_handler_v1.get
      description: 'Retrieve information about a specific merchant by ID. Note: The legacy endpoint `/v1/partner/{partner_id}/merchant/{merchant_id}` is deprecated but still supported for backward compatibility.'
      tags:
        - Marketplace V1
      parameters:
        - name: merchant_id
          in: path
          required: true
          schema:
            type: string
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Merchant response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantResponseSchema'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
    patch:
      summary: Update marketplace merchant
      operationId: update_partner_merchant_handler_v1.patch
      description: 'Update details of a specific merchant associated with your marketplace. Note: The legacy endpoint `/v1/partner/{partner_id}/merchant/{merchant_id}` is deprecated but still supported for backward compatibility.'
      tags:
        - Marketplace V1
      parameters:
        - name: merchant_id
          in: path
          required: true
          schema:
            type: string
          description: ''
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Success
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePartnerMerchantSchema'
            examples:
              GB merchant:
                value:
                  national_id: '925976105'
                  legal_name: Two B2B LIMITED
                  email: test@two.inc
                  email_erp: erp@two.inc
                  email_invoice: invoice@two.inc
                  phone: '12345678'
                  phone_invoice: '12345670'
                  website: https://two.inc
                  address_lines: Test Square
                  address_city: London
                  address_postal_code: AED 12A
                  address_country_code: GB
                  payment_provider_details:
                    bank_account:
                      description: Bank Account Test
                      branch_sort_code: 04-00-11
                      local_account_number: '31126819'
                      country_code: GB
              NO merchant:
                value:
                  national_id: '13078389'
                  legal_name: Two AS
                  email: test@two.inc
                  email_erp: erp@two.inc
                  email_invoice: invoice@two.inc
                  phone: '12345678'
                  phone_invoice: '12345670'
                  website: https://two.inc
                  address_lines: Test plass
                  address_city: Oslo
                  address_postal_code: '1111'
                  address_country_code: 'NO'
                  payment_provider_details:
                    bank_account:
                      description: Bank Account Test
                      bban: '11111111111'
                      iban: NO9311111111111
                      bic: DNBANOKK
                      country_code: 'NO'
  /partner/v1/iban_accounts:
    get:
      summary: Get IBAN collection accounts
      operationId: get_partner_iban_accounts_v1.get
      description: 'Returns IBAN collection account details for eligible partners. Access is restricted - please contact Two support for more information. Note: The legacy endpoint `/v1/partner/iban_accounts` is deprecated but still supported for backward compatibility.'
      tags:
        - Marketplace V1
      parameters: []
      responses:
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Client' specific JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IbanAccounts'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - X-Api-Key: []
